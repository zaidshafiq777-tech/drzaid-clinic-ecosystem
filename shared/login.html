<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Zaid Healthcare OS — Sign In</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json?v=20260710c">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="theme.css">
<style>
  body{background:linear-gradient(160deg,var(--clinical-900) 0%,var(--clinical-700) 55%,var(--clinical-600) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-raised);width:100%;max-width:378px;padding:34px 30px 26px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .brand img{width:42px;height:42px;border-radius:10px}
  .brand .n{font-size:15.5px;font-weight:700;color:var(--slate-900);line-height:1.3}
  .brand .t{font-size:11.5px;color:var(--slate-500);text-transform:uppercase;letter-spacing:.05em}
  h1{font-size:19px;margin-bottom:4px}
  .lede{font-size:13px;color:var(--slate-500);margin-bottom:22px}
  label{font-size:12px;font-weight:600;color:var(--slate-700);display:block;margin-bottom:5px}
  .field{margin-bottom:14px;position:relative}
  input{width:100%;padding:11px 12px;border:1px solid var(--slate-200);border-radius:var(--radius-sm);font-size:14.5px;font-family:inherit;box-sizing:border-box}
  input:focus{outline:2px solid var(--clinical-500);outline-offset:1px;border-color:var(--clinical-500)}
  .eye{position:absolute;right:10px;top:32px;background:none;border:none;font-size:15px;color:var(--slate-500);cursor:pointer;padding:2px 4px}
  .submit{width:100%;padding:12px;background:var(--clinical-700);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14.5px;font-weight:700;margin-top:6px}
  .submit:hover{background:var(--clinical-600)}
  .submit:disabled{opacity:.6}
  .err{background:#FDECEC;border:1px solid #F3C6C2;color:var(--signal-critical);font-size:12.5px;padding:9px 11px;border-radius:var(--radius-sm);margin-bottom:14px;display:none}
  .foot{text-align:center;font-size:11px;color:var(--slate-500);margin-top:20px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="../assets/icon-192.png" alt="">
      <div><div class="n">Dr. Zaid Healthcare OS</div><div class="t">Clinic Operations Platform</div></div>
    </div>
    <h1>Sign in</h1>
    <div class="lede">Enter your staff credentials to continue.</div>
    <div class="err" id="err"></div>
    <button type="button" class="submit" id="googleBtn" onclick="dzSignInWithGoogle()" style="background:#fff;color:#3c4043;border:1px solid var(--slate-200);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34 5.4 29.3 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5 44.5 35.3 44.5 24c0-1.2-.1-2.4-.9-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34 5.4 29.3 3.5 24 3.5c-7.7 0-14.4 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 44.5c5.2 0 9.9-1.8 13.5-4.9l-6.2-5.2c-2 1.4-4.6 2.1-7.3 2.1-5.3 0-9.7-3.4-11.3-8.1l-6.5 5C9.5 40.1 16.2 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.5l6.2 5.2C40.9 35.9 44.5 30.4 44.5 24c0-1.2-.1-2.4-.9-3.5z"/></svg>
      Sign in with Google
    </button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="flex:1;height:1px;background:var(--slate-200)"></div>
      <span style="font-size:11px;color:var(--slate-500)">OR</span>
      <div style="flex:1;height:1px;background:var(--slate-200)"></div>
    </div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="pw">Password</label>
        <input id="pw" type="password" autocomplete="current-password" required>
        <button type="button" class="eye" onclick="dzToggleEye()">👁</button>
      </div>
      <button class="submit" id="submitBtn" type="submit">Sign in</button>
    </form>
    <div class="foot">Dr. Zaid Healthcare Operating System &middot; Production</div>
  </div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=20260710c"></script>
<script src="auth.js?v=20260710c"></script>
<script src="auth-role-service.js?v=20260712"></script>
<script>
function dzToggleEye(){
  const p = document.getElementById('pw');
  p.type = p.type === 'password' ? 'text' : 'password';
}

async function dzSignInWithGoogle() {
  const errBox = document.getElementById('err');
  errBox.style.display = 'none';
  const { error } = await window.dzSupabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href },
  });
  if (error) {
    errBox.textContent = 'Google sign-in is not available yet — ' + error.message;
    errBox.style.display = 'block';
  }
  // On success, Google redirects back here automatically; the check below picks up the new session.
}

// If already signed in (including just after a Google OAuth redirect back to
// this page), resolve their profile status and go to the right place.
(async () => {
  const { data: { session } } = await window.dzSupabase.auth.getSession();
  if (session) await dzRouteAfterAuth();
})();

/** Single place that decides where a signed-in user goes: profile setup
 *  (missing/incomplete/pending/rejected/suspended) or their portal home. */
async function dzRouteAfterAuth() {
  const profile = await ensureProfileExists();
  if (!profile) {
    const errBox = document.getElementById('err');
    errBox.textContent = 'Could not load your profile. Check your connection and try again, or contact the owner.';
    errBox.style.display = 'block';
    return;
  }
  if (!profile.profile_completed || !profile.role) {
    window.location.href = profile.status === 'pending' ? 'profile-setup.html?status=pending'
      : profile.status === 'rejected' ? 'profile-setup.html?status=rejected'
      : 'profile-setup.html';
    return;
  }
  if (profile.status === 'suspended') { window.location.href = 'profile-setup.html?status=suspended'; return; }
  if (profile.status === 'pending') { window.location.href = 'profile-setup.html?status=pending'; return; }
  window.location.href = getDefaultPortal(profile.role);
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  const errBox = document.getElementById('err');
  const btn = document.getElementById('submitBtn');
  errBox.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const { error } = await window.dzSupabase.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    await dzRouteAfterAuth();
  } catch (err) {
    errBox.textContent = err.message === 'Invalid login credentials'
      ? 'Incorrect email or password.'
      : (err.message || 'Sign-in failed. Check your connection and try again.');
    errBox.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("../sw.js").catch(()=>{})})}</script>
</body>
</html>
