<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Zaid Healthcare OS — Sign In</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="theme.css">
<style>
  body{background:linear-gradient(160deg,var(--clinical-900) 0%,var(--clinical-700) 55%,var(--clinical-600) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-raised);width:100%;max-width:378px;padding:34px 30px 26px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .brand img{width:42px;height:42px;border-radius:10px}
  .brand .n{font-size:15.5px;font-weight:700;color:var(--slate-900);line-height:1.3}
  .brand .t{font-size:11.5px;color:var(--slate-500);text-transform:uppercase;letter-spacing:.05em}
  h1{font-size:19px;margin-bottom:4px}
  .lede{font-size:13px;color:var(--slate-500);margin-bottom:22px}
  label{font-size:12px;font-weight:600;color:var(--slate-700);display:block;margin-bottom:5px}
  .field{margin-bottom:14px;position:relative}
  input{width:100%;padding:11px 12px;border:1px solid var(--slate-200);border-radius:var(--radius-sm);font-size:14.5px;font-family:inherit;box-sizing:border-box}
  input:focus{outline:2px solid var(--clinical-500);outline-offset:1px;border-color:var(--clinical-500)}
  .eye{position:absolute;right:10px;top:32px;background:none;border:none;font-size:15px;color:var(--slate-500);cursor:pointer;padding:2px 4px}
  .submit{width:100%;padding:12px;background:var(--clinical-700);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14.5px;font-weight:700;margin-top:6px}
  .submit:hover{background:var(--clinical-600)}
  .submit:disabled{opacity:.6}
  .err{background:#FDECEC;border:1px solid #F3C6C2;color:var(--signal-critical);font-size:12.5px;padding:9px 11px;border-radius:var(--radius-sm);margin-bottom:14px;display:none}
  .foot{text-align:center;font-size:11px;color:var(--slate-500);margin-top:20px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="../assets/icon-192.png" alt="">
      <div><div class="n">Dr. Zaid Healthcare OS</div><div class="t">Clinic Operations Platform</div></div>
    </div>
    <h1>Sign in</h1>
    <div class="lede">Enter your staff credentials to continue.</div>
    <div class="err" id="err"></div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="pw">Password</label>
        <input id="pw" type="password" autocomplete="current-password" required>
        <button type="button" class="eye" onclick="dzToggleEye()">👁</button>
      </div>
      <button class="submit" id="submitBtn" type="submit">Sign in</button>
    </form>
    <div class="foot">Dr. Zaid Healthcare Operating System &middot; Production</div>
  </div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
<script>
function dzToggleEye(){
  const p = document.getElementById('pw');
  p.type = p.type === 'password' ? 'text' : 'password';
}

// If already signed in, skip straight to the right dashboard.
(async () => {
  const { data: { session } } = await window.dzSupabase.auth.getSession();
  if (session) {
    const { data: profile } = await window.dzSupabase.from('profiles').select('role').eq('id', session.user.id).single();
    if (profile) window.location.href = DZ_ROLE_HOME[profile.role] || 'login.html';
  }
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  const errBox = document.getElementById('err');
  const btn = document.getElementById('submitBtn');
  errBox.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const { data, error } = await window.dzSupabase.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    const { data: profile, error: pErr } = await window.dzSupabase
      .from('profiles').select('role').eq('id', data.user.id).single();
    if (pErr || !profile) throw new Error('Could not resolve your role. Contact the owner.');
    window.location.href = DZ_ROLE_HOME[profile.role] || 'login.html';
  } catch (err) {
    errBox.textContent = err.message === 'Invalid login credentials'
      ? 'Incorrect email or password.'
      : (err.message || 'Sign-in failed. Check your connection and try again.');
    errBox.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("../sw.js").catch(()=>{})})}</script>
</body>
</html>
