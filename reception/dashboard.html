<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reception — Dr. Zaid Healthcare OS</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="../shared/theme.css">
<style>.primary-link{padding:8px 14px;background:var(--clinical-700);color:#fff;border-radius:7px;font-size:12.5px;font-weight:700}.ghost-refresh{padding:8px 14px;background:#fff;border:1px solid var(--slate-200);border-radius:7px;font-size:12.5px;font-weight:600}</style>
</head>
<body>
<div id="dz-shell-root"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/clinical.js"></script>
<script src="../shared/visit-status.js"></script>
<script src="../shared/ai-manager.js"></script>
<script src="../shared/automation-manager.js"></script>
<script src="../shared/command-bar.js"></script>
<script src="../shared/ai-copilot.js"></script>
<script>
(async () => {
  const session = await dzRequireSession(["org_owner","branch_admin","super_admin","receptionist","billing"]);
  if (!session) return;
  dzRenderShell({ activeKey: "reception", title: "Reception", profile: session.profile });
  dzCommandBarInit(session.profile);
  dzCopilotInit(session.profile);

  const content = document.getElementById("dz-content");
  content.innerHTML = `<div class="dz-grid" id="metrics">
      ${dzCard("Today's Tokens","…")}
      ${dzCard("Waiting Now","…")}
      ${dzCard("Pending Payments","…")}
    </div>
    <div class="dz-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <h2 style="margin:0">Live Token Queue</h2>
        <div style="display:flex;gap:8px">
          <a href="registration.html" class="primary-link">+ Register Patient</a>
          <button class="ghost-refresh" onclick="dzLoadQueue()">Refresh</button>
        </div>
      </div>
      <div class="sub">In-clinic and online patients in one unified queue.</div>
      <div id="queueTable"></div>
    </div>`;
  await dzLoadQueue();
  await dzLoadMetrics();
})();

async function dzLoadMetrics() {
  try {
    const orgId = window.DZ_SESSION.profile.organization_id;
    const today = new Date(); today.setHours(0,0,0,0);
    const [{count:tokensToday}, {data:waitingRows}, {count:pending}] = await Promise.all([
      window.dzSupabase.from("tokens").select("id",{count:"exact",head:true}).eq("organization_id",orgId).gte("created_at",today.toISOString()),
      window.dzSupabase.from("tokens").select("status").eq("organization_id",orgId).gte("created_at",today.toISOString()),
      window.dzSupabase.from("bookings").select("id",{count:"exact",head:true}).eq("organization_id",orgId).eq("status","pending_payment"),
    ]);
    const waiting = (waitingRows||[]).filter(t=>["registered","waiting_vitals","vitals_done","waiting_doctor","with_doctor"].includes(t.status)).length;
    document.getElementById("metrics").innerHTML =
      dzCard("Today's Tokens", tokensToday ?? 0, "Live") +
      dzCard("Waiting Now", waiting, "Live") +
      dzCard("Pending Payments", pending ?? 0, "Live — online bookings");
  } catch (e) { console.warn("[Reception] metrics failed", e); }
}

async function dzLoadQueue() {
  const host = document.getElementById("queueTable");
  if (!host) return;
  host.innerHTML = `<div style="font-size:12.5px;color:var(--slate-500)">Loading…</div>`;
  try {
    const orgId = window.DZ_SESSION.profile.organization_id;
    const today = new Date(); today.setHours(0,0,0,0);
    const { data, error } = await window.dzSupabase
      .from("tokens")
      .select("id, token_number, status, source, priority, payment_status, created_at, patients(full_name), visits(visit_mode, chief_complaint)")
      .eq("organization_id", orgId)
      .gte("created_at", today.toISOString())
      .order("token_number", { ascending: true });
    if (error) throw error;
    if (!data || !data.length) { host.innerHTML = dzEmptyState("▤","No patients yet today","Register a patient to start today's queue."); return; }
    host.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="text-align:left;color:var(--slate-500);font-size:11px;text-transform:uppercase">
        <th style="padding:8px 6px">Token</th><th>Patient</th><th>Visit</th><th>Status</th><th>Waiting</th><th>Payment</th><th>Action</th>
      </tr></thead>
      <tbody>${data.map(t => {
        const canSend = [DZ_STATUS.REGISTERED, DZ_STATUS.WAITING_VITALS, DZ_STATUS.VITALS_DONE].includes(t.status);
        return `
        <tr style="border-top:1px solid var(--slate-100)">
          <td style="padding:8px 6px;font-family:var(--font-data)">#${t.token_number}</td>
          <td>${t.patients?.full_name || "—"}</td>
          <td>${t.visits?.visit_mode === "online" ? "Online" : "In-Clinic"}</td>
          <td><span class="dz-badge live">${DZ_STATUS_LABEL[t.status] || t.status}</span></td>
          <td>${dzWaitingMinutes(t.created_at)} min</td>
          <td>${t.payment_status}</td>
          <td>${canSend ? `<button class="ghost-refresh" style="padding:5px 10px;font-size:11.5px" onclick="dzSendToDoctor('${t.id}')">Send to Doctor</button>` : ""}</td>
        </tr>`;
      }).join("")}</tbody></table>`;
  } catch (e) {
    host.innerHTML = `<div style="color:var(--signal-critical);font-size:12.5px">Failed to load queue: ${e.message}</div>`;
  }
}

/** Real state transition — sets status to waiting_doctor so Doctor Workspace's
 *  query (which now also safety-nets on vitals_done) picks the patient up immediately. */
async function dzSendToDoctor(tokenId) {
  try {
    const { error } = await window.dzSupabase.from("tokens").update({ status: DZ_STATUS.WAITING_DOCTOR }).eq("id", tokenId);
    if (error) throw error;
    await dzLoadQueue();
  } catch (e) {
    alert("Could not send to doctor: " + e.message);
  }
}
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("../sw.js").catch(()=>{})})}</script>
</body>
</html>
