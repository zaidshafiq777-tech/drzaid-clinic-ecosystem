<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard — Dr. Zaid Healthcare OS</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
<div id="dz-shell-root"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/shell.js"></script>
<script>
(async () => {
  const session = await dzRequireSession(["org_owner","branch_admin","super_admin"]);
  if (!session) return;
  dzRenderShell({ activeKey: "owner", title: "Owner Dashboard", profile: session.profile });

  const content = document.getElementById("dz-content");
  content.innerHTML = `<div class="dz-grid" id="metrics">
      ${dzCard("Total Patients","…")}
      ${dzCard("Today's Tokens","…")}
      ${dzCard("Staff Accounts","…")}
      ${dzCard("Pending Payments","…")}
    </div>
    <div class="dz-panel">
      <h2>Clinic Operations <span class="dz-badge soon">Milestone 2</span></h2>
      <div class="sub">Queue board, prescriptions, billing and reports will be migrated into this shell next.</div>
      ${dzEmptyState("◆","Awaiting live data","This panel will show the live patient flow, revenue and AI ecosystem status once Milestone 2 (Patient Registration &amp; Token Queue) is built into this new shell.")}
    </div>`;

  try {
    const orgId = session.profile.organization_id;
    const today = new Date(); today.setHours(0,0,0,0);
    const [{count:patients}, {count:tokensToday}, {count:staff}, {count:pending}] = await Promise.all([
      window.dzSupabase.from("patients").select("id",{count:"exact",head:true}).eq("organization_id",orgId),
      window.dzSupabase.from("tokens").select("id",{count:"exact",head:true}).eq("organization_id",orgId).gte("created_at",today.toISOString()),
      window.dzSupabase.from("profiles").select("id",{count:"exact",head:true}).eq("organization_id",orgId),
      window.dzSupabase.from("bookings").select("id",{count:"exact",head:true}).eq("organization_id",orgId).eq("status","pending_payment"),
    ]);
    document.getElementById("metrics").innerHTML =
      dzCard("Total Patients", patients ?? 0, "All-time, live") +
      dzCard("Today's Tokens", tokensToday ?? 0, "Live") +
      dzCard("Staff Accounts", staff ?? 0, "Live") +
      dzCard("Pending Payments", pending ?? 0, "Live — bookings awaiting verification");
  } catch (e) {
    console.warn("[Owner] metrics failed", e);
  }
})();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("../sw.js").catch(()=>{})})}</script>
</body>
</html>
