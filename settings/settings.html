<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Dr. Zaid Healthcare OS</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
<div id="dz-shell-root"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/shell.js"></script>
<script>
(async () => {
  const session = await dzRequireSession(["org_owner","branch_admin","super_admin"]);
  if (!session) return;
  dzRenderShell({ activeKey: "settings", title: "Settings", profile: session.profile });

  document.getElementById("dz-content").innerHTML = `
    <div class="dz-panel">
      <h2>Clinic Settings <span class="dz-badge soon">Coming soon</span></h2>
      <div class="sub">Staff accounts, clinic profile, payment configuration and AI provider settings will be managed here.</div>
      ${dzEmptyState("⚙","Not implemented yet","Settings management is planned for a later milestone. Staff accounts are currently managed directly by the Founder.")}
    </div>`;
})();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("../sw.js").catch(()=>{})})}</script>
</body>
</html>
