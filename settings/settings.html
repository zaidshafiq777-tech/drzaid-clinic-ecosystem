<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Dr. Zaid Healthcare OS</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
<div id="dz-shell-root"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/response-parser.js"></script>
<script src="../shared/ai-manager.js"></script>
<script src="../shared/automation-manager.js"></script>
<script src="../shared/command-bar.js"></script>
<script src="../shared/ai-copilot.js"></script>
<script>
(async () => {
  const session = await dzRequireSession(["org_owner","branch_admin","super_admin"]);
  if (!session) return;
  dzRenderShell({ activeKey: "settings", title: "Settings", profile: session.profile });
  dzCommandBarInit(session.profile);
  dzCopilotInit(session.profile);

  document.getElementById("dz-content").innerHTML = `
    <div class="dz-panel">
      <h2>AI Providers <span class="dz-badge live">Live</span></h2>
      <div class="sub">Gemini primary + Groq automatic fallback, circuit breaker, usage logs.</div>
      <a href="ai-providers.html" style="display:inline-block;padding:10px 16px;background:var(--clinical-700);color:#fff;border-radius:8px;font-size:13px;font-weight:700">Open AI Providers ↗</a>
    </div>
    <div class="dz-panel">
      <h2>API &amp; Integrations <span class="dz-badge live">Live status</span></h2>
      <div class="sub">Real connection status for every provider — nothing here is faked.</div>
      <a href="api-settings.html" style="display:inline-block;padding:10px 16px;background:var(--clinical-700);color:#fff;border-radius:8px;font-size:13px;font-weight:700">Open API &amp; Integrations ↗</a>
    </div>
    <div class="dz-panel">
      <h2>Organization / Clinic Profile <span class="dz-badge live">Live</span></h2>
      <div class="sub">Clinic name, logo, contact, doctor details, prescription header, hours, and payment settings.</div>
      <a href="organization-profile.html" style="display:inline-block;padding:10px 16px;background:var(--clinical-700);color:#fff;border-radius:8px;font-size:13px;font-weight:700">Open Organization Profile ↗</a>
    </div>
    <div class="dz-panel">
      <h2>Users &amp; Roles <span class="dz-badge live">Live</span></h2>
      <div class="sub">Approve new staff, change roles, suspend or reactivate accounts.</div>
      <a href="users.html" style="display:inline-block;padding:10px 16px;background:var(--clinical-700);color:#fff;border-radius:8px;font-size:13px;font-weight:700">Open Users &amp; Roles ↗</a>
    </div>
    <div class="dz-panel">
      <h2>Clinic Settings <span class="dz-badge soon">Coming soon</span></h2>
      <div class="sub">Clinic profile and payment configuration will be managed here.</div>
      ${dzEmptyState("⚙","Not implemented yet","Settings management is planned for a later milestone.")}
    </div>`;
})();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("../sw.js").catch(()=>{})})}</script>
</body>
</html>
