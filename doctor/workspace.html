<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Workspace — Dr. Zaid Healthcare OS</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json?v=20260710c">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="../shared/theme.css">
<style>
  .wsGrid{display:grid;grid-template-columns:230px 1fr;gap:14px;align-items:start}
  @media(max-width:980px){.wsGrid{grid-template-columns:1fr}}
  .qItem{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent}
  .qItem:hover{background:var(--slate-50)}
  .qItem.active{background:var(--clinical-100);border-color:var(--clinical-500)}
  .qItem .tk{font-family:var(--font-data);font-size:11px;color:var(--slate-500)}
  .fld{margin-bottom:10px}
  .fld label{font-size:11.5px;font-weight:600;color:var(--slate-700);display:block;margin-bottom:4px}
  .fld textarea,.fld input{width:100%;padding:9px 11px;border:1px solid var(--slate-200);border-radius:7px;font-size:13.5px;font-family:inherit;box-sizing:border-box}
  .fld textarea{min-height:56px;resize:vertical}
  .ai-btn{padding:7px 12px;background:var(--clinical-100);color:var(--clinical-700);border:none;border-radius:7px;font-size:11.5px;font-weight:700;margin:2px 4px 2px 0}
  .ai-btn:hover{background:var(--clinical-500);color:#fff}
  .primary-btn{padding:11px 22px;background:var(--clinical-700);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13.5px}
  .med-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;margin-bottom:6px}
  .med-row input{padding:7px;border:1px solid var(--slate-200);border-radius:6px;font-size:12.5px}
  .wsCols{display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start}
  @media(max-width:1200px){.wsCols{grid-template-columns:1fr}}
  .listenerBox{background:var(--clinical-50);border:1px solid var(--clinical-100);border-radius:10px;padding:14px;margin-bottom:14px}
  .listen-btn{padding:9px 16px;border:none;border-radius:8px;font-size:12.5px;font-weight:700;margin:0 6px 6px 0}
  .listen-btn.start{background:var(--signal-success);color:#fff}
  .listen-btn.pause{background:var(--signal-warning);color:#fff}
  .listen-btn.stop{background:var(--signal-critical);color:#fff}
  .listen-btn.ghost{background:#fff;border:1px solid var(--slate-200);color:var(--slate-700)}
  .listen-btn:disabled{opacity:.4}
  .transcriptBox{width:100%;min-height:90px;border:1px solid var(--slate-200);border-radius:8px;padding:10px;font-size:12.5px;font-family:inherit;box-sizing:border-box;resize:vertical}
  .warnBar{padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:6px}
  .warnBar.critical{background:#FDECEC;color:var(--signal-critical)}
  .warnBar.warning{background:#FFF7E6;color:var(--signal-warning)}
  .warnBar.info{background:#E8F1FB;color:var(--signal-info)}
  .warnBar.note{background:var(--slate-100);color:var(--slate-500)}
</style>
</head>
<body>
<div id="dz-shell-root"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js?v=20260710c"></script>
<script src="../shared/auth.js?v=20260710c"></script>
<script src="../shared/shell.js?v=20260710c"></script>
<script src="../shared/clinical.js?v=20260710c"></script>
<script src="../shared/date-utils.js?v=20260710c"></script>
<script src="../shared/queue-service.js?v=20260711fix"></script>
<script src="../shared/ai-manager.js?v=20260710c"></script>
<script src="../shared/automation-manager.js?v=20260710c"></script>
<script src="../shared/command-bar.js?v=20260710c"></script>
<script src="../shared/ai-copilot.js?v=20260710c"></script>
<script src="../shared/voice-listener.js?v=20260710c"></script>
<script src="../shared/prescription-agent.js?v=20260710c"></script>
<script src="../shared/visit-status.js?v=20260710c"></script>
<script src="../shared/prescription-safety.js?v=20260710c"></script>
<script src="../shared/prescription-renderer.js?v=20260710c"></script>
<script src="../shared/report-vision-uploader.js?v=20260710c"></script>
<script src="../shared/report-analyzer.js?v=20260710c"></script>
<script>
let dzOrgId=null, dzDoctorId=null, dzQueue=[], dzSelected=null, dzMeds=[], dzCurrentVitals=null;
(async () => {
  const session = await dzRequireSession(["org_owner","branch_admin","super_admin","doctor"]);
  if (!session) return;
  dzOrgId = session.profile.organization_id;
  dzDoctorId = session.profile.id;
  dzRenderShell({ activeKey: "doctor", title: "Doctor Workspace", profile: session.profile });
  dzCommandBarInit(session.profile);
  dzCopilotInit(session.profile);

  document.getElementById("dz-content").innerHTML = `
    <div class="wsGrid">
      <div class="dz-panel" style="padding:12px">
        <h2 style="font-size:13px;margin-bottom:8px">Your Queue</h2>
        <div id="dQueue"></div>
      </div>
      <div id="dMain">${dzEmptyState("✚","Select a patient","Choose a patient from your queue on the left to begin.")}</div>
    </div>`;
  await dzLoadQueue();
  dzStartDoctorPolling();
})();

// PART 6 — safe polling refresh (Supabase Realtime publication status for
// `tokens` is not confirmed - see MANUAL_SETUP_REQUIRED.md for the manual
// step needed if realtime push updates are wanted instead of polling).
let dzDoctorPollHandle = null;
function dzStartDoctorPolling() {
  if (dzDoctorPollHandle) return;
  dzDoctorPollHandle = setInterval(() => { if (!document.hidden) dzLoadQueue(); }, 12000);
}
document.addEventListener("visibilitychange", () => { if (!document.hidden) dzLoadQueue(); });

async function dzLoadQueue() {
  const host = document.getElementById("dQueue");
  const { rows, debug } = await dzLoadQueueService(dzOrgId, { onlyToday: false, statusFilter: DZ_DOCTOR_QUEUE_STATUSES });
  // Map the normalized queue-service shape back to the legacy shape the rest
  // of this file already reads (dzSelected.id / .patient_id / .visit_id /
  // .patients.full_name / .visits.chief_complaint / .token_number) - this
  // fixes the actual fetch bug (fragile nested select + timezone) without
  // requiring every one of the 21 downstream references in this file to change.
  dzQueue = rows.map(r => ({
    id: r.tokenId, token_number: r.tokenNumber, visit_id: r.visitId, patient_id: r.patientId,
    status: r.status, created_at: r.createdAt,
    patients: r.patient ? { id: r.patient.id, full_name: r.patient.fullName, age: r.patient.age, gender: r.patient.gender, phone: r.patient.phone, emr_number: r.patient.emrNumber } : null,
    visits: r.visit ? { chief_complaint: r.visit.chiefComplaint } : null,
  }));
  console.log("[Queue Debug] doctor query result (raw)", debug);
  console.log("[Queue Debug] doctor query result (normalized)", dzQueue);
  host.innerHTML = dzQueue.length ? dzQueue.map((t,i) =>
    `<div class="qItem ${dzSelected?.id===t.id?'active':''}" onclick="dzOpenPatient(${i})">
       <div class="tk">#${t.token_number} &middot; ${t.status==='with_doctor'?'In progress':DZ_STATUS_LABEL[t.status]||t.status}</div>
       <div style="font-weight:600;font-size:13px">${t.patients?.full_name||'<span style="color:var(--signal-warning)">Patient record unavailable</span>'}</div>
       <div style="font-size:11.5px;color:var(--slate-500)">${t.visits?.chief_complaint||''}</div>
       ${t.status===DZ_STATUS.REGISTERED ? `<div style="font-size:10.5px;color:var(--signal-warning);margin-top:2px">⚠ Not sent to doctor yet</div>` : ""}
     </div>`).join("") : `<div style="font-size:12px;color:var(--slate-500)">Queue is empty.</div>`;
  dzRenderQueueDebug(dzQueue, debug);
}

/** Owner/dev-only debug panel - shows exactly which patients loaded, why,
 *  and full IDs/timestamps for tracing the queue lifecycle. Only visible
 *  when window.DZ_DEBUG === true (set via console or a future Settings toggle). */
function dzRenderQueueDebug(rows, debug) {
  const isOwnerTier = ["org_owner","branch_admin","super_admin"].includes(window.DZ_SESSION?.profile?.role);
  const showDebug = isOwnerTier && (window.DZ_DEBUG === true);
  let panel = document.getElementById("queueDebugPanel");
  if (!showDebug) { if (panel) panel.remove(); return; }
  if (!panel) {
    panel = document.createElement("div");
    panel.id = "queueDebugPanel";
    panel.style.cssText = "margin-top:10px;background:#0f172a;color:#94a3b8;border-radius:8px;padding:8px;font-family:var(--font-data);font-size:10px;max-height:220px;overflow:auto";
    document.getElementById("dQueue").parentElement.appendChild(panel);
  }
  panel.innerHTML = `<b style="color:#e2e8f0">Doctor Queue Debug</b><br>
    Raw rows: ${debug.rawTokenCount} · Normalized: ${debug.normalizedCount} · Excluded: ${debug.excluded.length}<br>
    Selected: token=${dzSelected?.id?.slice(0,8)||'-'} visit=${dzSelected?.visit_id?.slice(0,8)||'-'} patient=${dzSelected?.patient_id?.slice(0,8)||'-'} status=${dzSelected?.status||'-'}<br>` +
    rows.map(t => `token=${t.id?.slice(0,8)} #${t.token_number} status=${t.status} patient=${t.patient_id?.slice(0,8)||'MISSING'}`).join("<br>");
}

async function dzOpenPatient(i) {
  const previouslySelectedId = dzSelected?.id;
  dzSelected = dzQueue[i];
  dzMeds = [{name:"",dosage:"",frequency:"",duration:""}];
  dzTranscriptFinal = ""; dzListener = null;
  await window.dzSupabase.from("tokens").update({ status: DZ_STATUS.WITH_DOCTOR }).eq("id", dzSelected.id);
  if (dzSelected.visit_id) await window.dzSupabase.from("visits").update({ status: DZ_STATUS.WITH_DOCTOR }).eq("id", dzSelected.visit_id);
  console.log("[Queue Debug] doctor opened patient, status -> with_doctor", { tokenId: dzSelected.id, visitId: dzSelected.visit_id });
  await dzLoadQueue();
  // dzLoadQueue rebuilds dzQueue and re-renders, but does not clear dzSelected -
  // re-find the same token in the fresh list so status badges stay accurate
  // while the doctor keeps working on the same patient (PART 5 requirement:
  // "Do not clear the selected patient merely because queue refresh runs").
  const stillThere = dzQueue.find(t => t.id === dzSelected.id);
  if (stillThere) dzSelected = stillThere;

  const [{data:vitalsRows}, {data:history}, {data:allergies}, {data:chronic}, {data:activeMeds}] = await Promise.all([
    window.dzSupabase.from("vitals").select("*").eq("visit_id", dzSelected.visit_id).order("created_at",{ascending:false}).limit(1),
    window.dzSupabase.from("prescriptions").select("diagnosis, created_at").eq("patient_id", dzSelected.patient_id).order("created_at",{ascending:false}).limit(3),
    window.dzSupabase.from("allergies").select("allergy, severity").eq("patient_id", dzSelected.patient_id),
    window.dzSupabase.from("chronic_conditions").select("condition").eq("patient_id", dzSelected.patient_id),
    window.dzSupabase.from("active_medications").select("medicine_name").eq("patient_id", dzSelected.patient_id).eq("active", true),
  ]);
  const v = (vitalsRows||[])[0];
  dzCurrentVitals = v || null;
  const vitalsLine = v ? `BP ${v.bp||'-'} · Pulse ${v.pulse||'-'} · Temp ${v.temperature||'-'} · SpO2 ${v.spo2||'-'}` + (v.is_abnormal ? ' <span class="dz-badge" style="background:#FDECEC;color:var(--signal-critical)">Abnormal</span>' : '') : 'No vitals recorded';
  const histLine = (history&&history.length) ? history.map(h=>`${new Date(h.created_at).toLocaleDateString()}: ${h.diagnosis||'—'}`).join('<br>') : 'No previous visits.';
  const allergyLine = (allergies&&allergies.length) ? allergies.map(a=>a.allergy+(a.severity?` (${a.severity})`:'')).join(', ') : 'None on file';
  const chronicLine = (chronic&&chronic.length) ? chronic.map(c=>c.condition).join(', ') : 'None on file';
  const activeMedLine = (activeMeds&&activeMeds.length) ? activeMeds.map(m=>m.medicine_name).join(', ') : 'None on file';

  document.getElementById("dMain").innerHTML = `
    <div class="dz-panel">
      <h2>${dzSelected.patients?.full_name} <span style="font-weight:400;color:var(--slate-500);font-size:12.5px">#${dzSelected.token_number} · ${dzSelected.patients?.age||'?'}y · ${dzSelected.patients?.gender||'-'}</span></h2>
      <div class="sub">Complaint: ${dzSelected.visits?.chief_complaint||'-'}</div>
      <div style="font-size:12.5px;margin-bottom:4px"><b>Vitals:</b> ${vitalsLine}</div>
      <div style="font-size:12.5px;margin-bottom:4px"><b>Allergies:</b> ${allergyLine}</div>
      <div style="font-size:12.5px;margin-bottom:4px"><b>Chronic conditions:</b> ${chronicLine}</div>
      <div style="font-size:12.5px;margin-bottom:4px"><b>Current medicines:</b> ${activeMedLine}</div>
      <div style="font-size:12.5px;margin-bottom:8px"><b>Previous visits:</b><br>${histLine}</div>
      <button class="ai-btn" onclick="dzToggleInlineVitals()" id="btnToggleVitals">${v ? '✎ Update Vitals' : '➕ Add Vitals'}</button>
      <div id="inlineVitalsForm" style="display:none;margin-top:10px;background:var(--slate-50);border-radius:8px;padding:10px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px">
          <input id="ivBp" placeholder="BP e.g. 120/80" value="${v?.bp||''}" style="padding:6px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px">
          <input id="ivPulse" type="number" placeholder="Pulse" value="${v?.pulse||''}" style="padding:6px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px">
          <input id="ivTemp" type="number" step="0.1" placeholder="Temp °F" value="${v?.temperature||''}" style="padding:6px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px">
          <input id="ivSpo2" type="number" placeholder="SpO2" value="${v?.spo2||''}" style="padding:6px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px">
          <input id="ivSugar" type="number" placeholder="RBS/FBS" value="${v?.rbs_fbs||''}" style="padding:6px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px">
          <input id="ivWeight" type="number" step="0.1" placeholder="Weight kg" value="${v?.weight||''}" style="padding:6px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px">
          <input id="ivHeight" type="number" placeholder="Height cm" value="${v?.height_cm||''}" style="padding:6px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px">
        </div>
        <button class="primary-btn" style="margin-top:8px;padding:7px 14px" onclick="dzSaveInlineVitals()">Save Vitals</button>
        <div id="inlineVitalsStatus" style="font-size:11.5px;margin-top:4px"></div>
      </div>
    </div>

    <div class="listenerBox">
      <h2 style="font-size:13.5px;margin-bottom:6px">🎙 Live Consultation Listener</h2>
      <div style="font-size:11.5px;color:var(--slate-500);margin-bottom:8px" id="listenerSupportNote"></div>
      <div style="margin-bottom:8px">
        <select id="listenLang" style="padding:6px 8px;border-radius:6px;border:1px solid var(--slate-200);font-size:12px">
          <option value="ur-PK">Roman Urdu / Urdu</option>
          <option value="en-US">English</option>
        </select>
        <span id="listenStatus" style="font-size:12px;color:var(--slate-500);margin-left:8px">Not started</span>
        <span id="listenTimer" style="font-size:12px;font-family:var(--font-data);margin-left:8px"></span>
      </div>
      <div>
        <button class="listen-btn start" id="btnStart" onclick="dzStartListening()">● START LISTENING</button>
        <button class="listen-btn pause" id="btnPause" onclick="dzPauseListening()" disabled>PAUSE</button>
        <button class="listen-btn ghost" id="btnResume" onclick="dzResumeListening()" disabled style="display:none">RESUME</button>
        <button class="listen-btn ghost" id="btnStop" onclick="dzStopListeningOnly()" disabled>STOP LISTENING</button>
        <button class="listen-btn stop" id="btnAnalyze" onclick="dzAnalyzeTranscript()">ANALYZE &amp; GENERATE PRESCRIPTION</button>
      </div>
      <div style="margin-top:8px">
        <label style="font-size:11px;font-weight:600;color:var(--slate-700)">Transcript (editable — correct anything before analyzing)</label>
        <textarea id="transcriptBox" class="transcriptBox"></textarea>
      </div>
      <div class="fld" style="margin-top:10px">
        <label>Paste Report Text (lab/imaging — optional)</label>
        <textarea id="reportPasteBox" rows="3" placeholder="Paste CBC, LFT, X-ray, ultrasound report text here…"></textarea>
        <button class="ai-btn" onclick="dzAnalyzeReportText()">Analyze Report Text</button>
        <div id="reportPasteStatus" style="font-size:11.5px;color:var(--slate-500);margin-top:4px"></div>
      </div>
      <div class="fld" style="margin-top:6px">
        <label>Upload Report (PDF / Image) — real Gemini Vision extraction</label>
        <select id="reportTypeSelect" style="width:100%;padding:8px;border:1px solid var(--slate-200);border-radius:6px;margin-bottom:6px">
          <option>CBC</option><option>LFT</option><option>RFT</option><option>Urine R/E</option>
          <option>Sugar Profile</option><option>Lipid Profile</option><option>Thyroid Profile</option>
          <option>X-ray</option><option>Ultrasound</option><option>ECG</option><option>CT/MRI</option><option>Other</option>
        </select>
        <input type="file" id="reportFileInput" accept=".pdf,image/jpeg,image/jpg,image/png,image/webp,image/heic">
        <button class="ai-btn" onclick="dzUploadAndAnalyzeReport()">Upload &amp; Analyze Report</button>
        <div id="reportFileStatus" style="font-size:11.5px;color:var(--slate-500);margin-top:4px"></div>
        <div id="reportVisionResult"></div>
        <div id="reportVisionDebug" style="display:none;margin-top:8px;background:#0f172a;color:#94a3b8;border-radius:8px;padding:10px;font-family:var(--font-data);font-size:10.5px;white-space:pre-wrap"></div>
      </div>
      <div id="analyzeStatus" style="font-size:12px;margin-top:6px"></div>
    </div>

    <div class="wsCols">
    <div class="dz-panel">
      <h2>Consultation</h2>
      <div class="fld"><label>Chief Complaint</label><textarea id="pComplaints">${dzSelected.visits?.chief_complaint||''}</textarea></div>
      <div class="fld"><label>History / Examination</label><textarea id="pExam"></textarea></div>
      <div class="fld"><label>Diagnosis</label><input id="pDiag"></div>
      <div class="fld"><label>Differential Diagnosis</label><input id="pDDx"></div>
      <div class="fld"><label>Medicines</label><div id="medsHost"></div><button class="ai-btn" onclick="dzAddMedRow()">+ Add Medicine</button></div>
      <div class="fld"><label>Investigations</label><input id="pInvest"></div>
      <div class="fld"><label>Advice</label><textarea id="pAdvice"></textarea></div>
      <div class="fld"><label>Follow-up (days from today, blank = none)</label><input id="pFollowup" type="number"></div>
      <div class="fld"><label>Referral (optional)</label><input id="pReferral"></div>

      <div style="background:var(--clinical-50);border:1px solid var(--clinical-100);border-radius:8px;padding:12px;margin:14px 0">
        <div style="font-size:12px;font-weight:700;color:var(--clinical-700);margin-bottom:6px">AI Assist — every action is a draft. You approve before anything is saved as final.</div>
        <button class="ai-btn" onclick="dzAiAction('soap')">Generate SOAP Note</button>
        <button class="ai-btn" onclick="dzAiAction('diagnosis')">Suggest Diagnosis</button>
        <button class="ai-btn" onclick="dzAiAction('prescription')">Draft Prescription</button>

        <button class="ai-btn" onclick="dzAiAction('redflags')">Check Red Flags</button>
        <button class="ai-btn" onclick="dzAiAction('urdu')">Urdu Patient Advice</button>
        <button class="ai-btn" onclick="dzAiAction('followup')">Follow-up Plan</button>
        <div id="aiOut" style="margin-top:8px;font-size:12.5px;white-space:pre-wrap"></div>
        <div style="font-size:10.5px;color:var(--slate-500);margin-top:6px">Drug-interaction checking is not available — it requires a licensed interaction database, not currently integrated. See DATABASE_CHANGES_REQUIRED.md.</div>
      </div>

      <button class="primary-btn" onclick="dzApprovePrescription()">Approve &amp; Save Prescription</button>
      <div id="rxStatus" style="margin-top:10px;font-size:12.5px"></div>
    </div>

    <div class="dz-panel">
      <h2>Prescription Preview</h2>
      <div class="sub">Appears after Stop &amp; Analyze, or after manual AI Assist drafting. Always editable on the left before saving.</div>
      <div id="rxWarnings"></div>
      <div id="rxPreviewHost">${dzEmptyState("📝","No draft yet","Start the consultation listener, or fill the form and use AI Assist.")}</div>
      <div id="rxPreviewActions" style="margin-top:10px;display:none">
        <button class="ai-btn" onclick="dzAnalyzeTranscript(true)">Regenerate</button>
        <button class="ai-btn" onclick="dzPrintPrescription()">Print</button>
        <button class="ai-btn" onclick="alert('PDF export requires a rendering library not yet added — use Print → Save as PDF from the browser print dialog for now.')">Export PDF</button>
        <button class="ai-btn" onclick="alert('WhatsApp sending requires a WhatsApp Business API account — not connected yet. See MANUAL_SETUP_REQUIRED.md.')">Send WhatsApp Summary</button>
      </div>
    </div>
    </div>`;
  dzRenderMeds();
  dzInitListenerUI();
}

function dzRenderMeds() {
  document.getElementById("medsHost").innerHTML = dzMeds.map((m,i) => `
    <div class="med-row">
      <input placeholder="Medicine" value="${m.name}" data-i="${i}" data-f="name" oninput="dzMeds[${i}].name=this.value">
      <input placeholder="Dosage" value="${m.dosage}" data-i="${i}" data-f="dosage" oninput="dzMeds[${i}].dosage=this.value">
      <input placeholder="Frequency" value="${m.frequency}" data-i="${i}" data-f="frequency" oninput="dzMeds[${i}].frequency=this.value">
      <input placeholder="Duration" value="${m.duration}" data-i="${i}" data-f="duration" oninput="dzMeds[${i}].duration=this.value">
      <button onclick="dzMeds.splice(${i},1);dzRenderMeds()" style="border:none;background:none;color:var(--signal-critical);cursor:pointer">✕</button>
    </div>`).join("");
}
/** Safety net: read medicine rows straight from the DOM, in case any input's
 *  live-sync was missed (e.g. value set programmatically, autofill, voice-fill). */
function dzReadMedsFromDom() {
  const rows = document.querySelectorAll("#medsHost .med-row");
  const out = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll("input[data-f]");
    const m = {name:"",dosage:"",frequency:"",duration:""};
    inputs.forEach(inp => { m[inp.dataset.f] = inp.value; });
    out.push(m);
  });
  return out;
}
function dzAddMedRow() { dzMeds.push({name:"",dosage:"",frequency:"",duration:""}); dzRenderMeds(); }

function dzToggleInlineVitals() {
  const el = document.getElementById("inlineVitalsForm");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

async function dzSaveInlineVitals() {
  const status = document.getElementById("inlineVitalsStatus");
  const bpParts = document.getElementById("ivBp").value.trim();
  const v = {
    bp: bpParts || null,
    pulse: document.getElementById("ivPulse").value || null,
    temperature: document.getElementById("ivTemp").value || null,
    spo2: document.getElementById("ivSpo2").value || null,
    rbs_fbs: document.getElementById("ivSugar").value || null,
    weight: document.getElementById("ivWeight").value || null,
    height_cm: document.getElementById("ivHeight").value || null,
  };
  v.bmi = dzComputeBMI(parseFloat(v.weight), parseFloat(v.height_cm)) || null;
  const check = dzCheckVitalsAbnormal(v);
  status.textContent = "Saving…";
  try {
    const { error } = await window.dzSupabase.from("vitals").insert({
      organization_id: dzOrgId, visit_id: dzSelected.visit_id, patient_id: dzSelected.patient_id,
      ...v, is_abnormal: check.isAbnormal, recorded_by: dzDoctorId,
    });
    if (error) throw error;
    status.innerHTML = check.isAbnormal
      ? `<span style="color:var(--signal-warning);font-weight:700">⚠ ${check.flags.join(", ")} — saved.</span>`
      : `<span style="color:var(--signal-success);font-weight:700">✓ Vitals saved.</span>`;
    dzCurrentVitals = { ...v, is_abnormal: check.isAbnormal };
  } catch (e) {
    status.innerHTML = `<span style="color:var(--signal-critical)">Save failed: ${e.message}</span>`;
  }
}

// ============================================================
// Milestone 4/5 — Live Consultation Listener + Report Intelligence + AI Prescription Generator
// ============================================================
let dzListener = null, dzTranscriptFinal = "", dzListenTimerHandle = null, dzListenSeconds = 0;
let dzReportSummaries = []; // real, AI-summarized report text only — never fabricated
let dzLastDraft = null, dzLastContext = null;

function dzInitListenerUI() {
  const supported = dzSpeechSupported();
  const note = document.getElementById("listenerSupportNote");
  dzReportSummaries = [];
  if (!supported) {
    note.innerHTML = `Browser voice recognition not supported. Please use Chrome, or type/paste the transcript manually below and click "ANALYZE & GENERATE PRESCRIPTION".`;
    document.getElementById("btnStart").disabled = true;
  } else {
    note.textContent = "Free browser speech recognition (Chrome). Manual editing is always available.";
  }
}

function dzFormatTimer(sec) {
  const m = String(Math.floor(sec/60)).padStart(2,"0"), s = String(sec%60).padStart(2,"0");
  return `${m}:${s}`;
}

function dzStartListening() {
  const lang = document.getElementById("listenLang").value;
  dzListener = dzCreateVoiceListener({
    lang,
    onInterim: (text) => { document.getElementById("transcriptBox").value = dzTranscriptFinal + " " + text; },
    onFinal: (text) => { dzTranscriptFinal += text; document.getElementById("transcriptBox").value = dzTranscriptFinal; },
  });
  if (dzListener) dzListener.start();
  document.getElementById("listenStatus").textContent = dzListener ? "● Listening…" : "Manual mode (no voice support)";
  document.getElementById("btnStart").disabled = true;
  document.getElementById("btnPause").disabled = !dzListener;
  document.getElementById("btnStop").disabled = !dzListener;
  dzListenSeconds = 0;
  clearInterval(dzListenTimerHandle);
  dzListenTimerHandle = setInterval(() => { dzListenSeconds++; document.getElementById("listenTimer").textContent = dzFormatTimer(dzListenSeconds); }, 1000);
}

function dzPauseListening() {
  if (dzListener) dzListener.pause();
  clearInterval(dzListenTimerHandle);
  document.getElementById("listenStatus").textContent = "Paused";
  document.getElementById("btnPause").style.display = "none";
  document.getElementById("btnResume").style.display = "inline-block";
  document.getElementById("btnResume").disabled = false;
}

function dzResumeListening() {
  if (dzListener) dzListener.resume();
  document.getElementById("listenStatus").textContent = "● Listening…";
  document.getElementById("btnPause").style.display = "inline-block";
  document.getElementById("btnResume").style.display = "none";
  dzListenTimerHandle = setInterval(() => { dzListenSeconds++; document.getElementById("listenTimer").textContent = dzFormatTimer(dzListenSeconds); }, 1000);
}

/** STOP LISTENING — mic only. Finalizes the transcript. Does NOT call AI. */
function dzStopListeningOnly() {
  if (dzListener) dzListener.stop();
  clearInterval(dzListenTimerHandle);
  document.getElementById("listenStatus").textContent = "Stopped — transcript ready to review";
  document.getElementById("btnStart").disabled = false;
  document.getElementById("btnPause").disabled = true;
  document.getElementById("btnStop").disabled = true;
  document.getElementById("btnPause").style.display = "inline-block";
  document.getElementById("btnResume").style.display = "none";
}

/** Paste-report-text mode — works today with existing AI, no OCR needed. */
async function dzAnalyzeReportText() {
  const box = document.getElementById("reportPasteBox");
  const status = document.getElementById("reportPasteStatus");
  const text = box.value.trim();
  if (!text) { status.innerHTML = `<span style="color:var(--signal-critical)">Paste report text first.</span>`; return; }
  status.textContent = "Summarizing report…";
  const prompt = `You are summarizing a real lab/imaging report for a doctor's prescription. Source text:\n"""${text}"""\nWrite a 5-8 line summary (4-6 lines if imaging) covering: test/report name, date if present, abnormal values, impression, and a follow-up suggestion if relevant. Rules: use only what is in the text above — never invent a value not present. If imaging, start with "As per uploaded report,". End lab summaries with "Clinical correlation advised." if appropriate. Return plain text only, no JSON, no markdown.`;
  const r = await AI.ask(prompt, { temperature: 0 });
  if (!r.ok) { status.innerHTML = `<span style="color:var(--signal-critical)">${r.error}</span>`; return; }
  dzPendingPastedReport = r.text.trim();
  status.innerHTML = `<div style="margin-top:4px;font-size:12px;background:var(--slate-50);border-radius:6px;padding:8px">${dzEsc(dzPendingPastedReport)}</div>
    <button class="primary-btn" style="padding:7px 14px;font-size:12px;margin-top:6px" onclick="dzAddPendingPastedReport()">✓ Add to Prescription</button>`;
}
let dzPendingPastedReport = null;
function dzAddPendingPastedReport() {
  if (!dzPendingPastedReport) return;
  dzReportSummaries.push(dzPendingPastedReport);
  const status = document.getElementById("reportPasteStatus");
  status.innerHTML = `<span style="color:var(--signal-success);font-weight:700">✓ Added to prescription context (${dzReportSummaries.filter(Boolean).length} report(s) attached).</span>`;
  document.getElementById("reportPasteBox").value = "";
  dzPendingPastedReport = null;
}

/** REAL upload+vision pipeline: file -> n8n webhook -> Gemini 2.5 Flash Vision -> structured result.
 *  The Gemini key is never touched here - only the n8n webhook URL is called. */
async function dzUploadAndAnalyzeReport() {
  const fileInput = document.getElementById("reportFileInput");
  const f = fileInput.files[0];
  const status = document.getElementById("reportFileStatus");
  const resultHost = document.getElementById("reportVisionResult");
  const debugHost = document.getElementById("reportVisionDebug");
  const isOwnerTier = ["org_owner","branch_admin","super_admin"].includes(window.DZ_SESSION?.profile?.role);
  if (!f) { status.innerHTML = `<span style="color:var(--signal-critical)">Choose a file first.</span>`; return; }

  const reportType = document.getElementById("reportTypeSelect").value;
  const patientContext = dzSelected ? {
    name: dzSelected.patients?.full_name, age: dzSelected.patients?.age, gender: dzSelected.patients?.gender,
    emr: dzSelected.patients?.emr_number, vitals: dzCurrentVitals || {},
  } : {};

  status.style.cssText = "font-size:11.5px;color:var(--slate-500);margin-top:4px";
  status.textContent = "Uploading…";
  resultHost.innerHTML = "";
  const t0 = performance.now();
  await new Promise(r => setTimeout(r, 150));
  status.textContent = "Extracting with Gemini Vision…";

  const rawResult = await dzUploadReportForVision(f, reportType, patientContext);
  const ms = Math.round(performance.now() - t0);

  const showVisionDebug = isOwnerTier && (window.DZ_DEBUG === true);
  if (showVisionDebug) {
    debugHost.style.display = "block";
    debugHost.textContent =
      `webhook: ${DZ_VISION_WEBHOOK}\n` +
      `fileName: ${f.name}\n` +
      `mimeType: ${f.type}\n` +
      `payloadSize: ~${Math.round(f.size/1024)} KB\n` +
      `HTTP/elapsed: ${ms}ms\n` +
      `response.ok: ${rawResult.ok}\n` +
      `top-level keys: ${Object.keys(rawResult).join(", ")}\n` +
      `normalization path: ${rawResult.source || "n/a"}\n` +
      (rawResult.ok ? `confidence: ${rawResult.confidence}` : `raw error: ${rawResult.error}`);
  } else {
    debugHost.style.display = "none";
  }

  // dzNormalizeReportResult is the fix for the "raw JSON dump" bug: n8n's
  // response shape (cleanSummary/keyFindings/prescriptionText) had drifted
  // from what this page was reading (summary/abnormalFindings) - this
  // normalizer is the single place that maps the real response correctly
  // and defensively strips anything that still looks like raw JSON.
  const r = dzNormalizeReportResult(rawResult);

  if (!r.ok) {
    status.innerHTML = `<span style="color:var(--signal-critical);font-weight:700">Failed: ${dzEsc(r.error)}</span>`;
    resultHost.innerHTML = `<div class="warnBar warning">${dzEsc(r.fallback || "Paste report text manually")}</div>`;
    return;
  }
  status.textContent = "Summarizing…";
  await new Promise(res => setTimeout(res, 100));

  // NOT auto-added anymore - doctor must explicitly click "Add to Prescription".
  // Stored here temporarily so the button's click handler can push it.
  dzPendingReport = { text: r.prescriptionText || r.cleanSummary, raw: r };

  status.innerHTML = `<span style="color:var(--signal-success);font-weight:700">✓ Report analyzed.</span>`;
  resultHost.innerHTML = `
    <div style="background:var(--slate-50);border-radius:8px;padding:10px;margin-top:8px;font-size:12px">
      <div><b>Clean Summary:</b> ${dzEsc(r.cleanSummary || "—")}</div>
      ${r.keyFindings.length ? `<div style="margin-top:4px"><b>Key Findings:</b><ul style="margin:4px 0 0 18px;padding:0">${r.keyFindings.map(f2=>`<li>${dzEsc(f2)}</li>`).join("")}</ul></div>` : ""}
      ${r.redFlags.length ? `<div style="color:var(--signal-critical);margin-top:4px"><b>Red Flags:</b> ${r.redFlags.map(dzEsc).join(", ")}</div>` : ""}
      ${r.impression ? `<div style="margin-top:4px"><b>Impression:</b> ${dzEsc(r.impression)}</div>` : ""}
      <div style="font-size:11px;color:var(--slate-500);margin-top:6px">Confidence: ${dzEsc(r.confidence)} &middot; Source: ${dzEsc(r.source)}</div>
      <details style="margin-top:6px"><summary style="cursor:pointer;font-size:11px;color:var(--slate-500)">Raw Extracted Text</summary>
        <div style="font-size:11px;white-space:pre-wrap;margin-top:4px">${dzEsc(r.rawExtractedText || "(none extracted)")}</div>
      </details>
      <div id="reportAddArea" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--slate-200)">
        <button class="primary-btn" style="padding:9px 16px;font-size:12.5px" onclick="dzAddPendingReportToPrescription()">✓ Add to Prescription</button>
        <span style="font-size:11px;color:var(--slate-500);margin-left:6px">Not added yet — click to include this summary in the prescription.</span>
      </div>
    </div>`;
  fileInput.value = "";
}

let dzPendingReport = null;

/** Doctor's explicit confirmation - only now does the report summary
 *  actually enter the prescription context (dzReportSummaries), matching
 *  the "AI suggests, doctor approves" rule used everywhere else in this app. */
function dzAddPendingReportToPrescription() {
  if (!dzPendingReport) return;
  dzReportSummaries.push(dzPendingReport.text);
  const entryIndex = dzReportSummaries.length - 1;
  const area = document.getElementById("reportAddArea");
  area.innerHTML = `<span style="color:var(--signal-success);font-weight:700;font-size:12.5px">✓ Added to prescription context.</span>
    <button class="ai-btn" style="margin-left:8px" onclick="dzRemoveReportSummary(${entryIndex}, this)">Remove</button>`;
  dzPendingReport = null;
}

function dzRemoveReportSummary(index, btnEl) {
  dzReportSummaries[index] = null;
  const area = btnEl ? btnEl.closest("#reportAddArea") : document.getElementById("reportAddArea");
  if (area) area.innerHTML = `<span style="font-size:11.5px;color:var(--slate-500)">Removed from prescription context.</span>`;
}

/** ANALYZE — the actual AI call. Separate from Stop Listening, as required. */
async function dzAnalyzeTranscript(isRegenerate) {
  if (dzListener) dzListener.stop();
  clearInterval(dzListenTimerHandle);
  document.getElementById("btnStart").disabled = false;
  document.getElementById("btnPause").disabled = true;
  document.getElementById("btnStop").disabled = true;

  const transcript = document.getElementById("transcriptBox").value.trim();
  const analyzeStatus = document.getElementById("analyzeStatus");
  if (!transcript) {
    analyzeStatus.innerHTML = `<span style="color:var(--signal-critical)">Transcript is empty. Record, or type/paste one above, then click ANALYZE again.</span>`;
    return;
  }
  if (!dzSelected) {
    analyzeStatus.innerHTML = `<span style="color:var(--signal-warning)">No patient selected — analysis needs a selected patient for real context. Select a patient from the queue first.</span>`;
    return;
  }
  analyzeStatus.innerHTML = `<span style="color:var(--slate-500)">Analyzing consultation with AI…</span>`;
  document.getElementById("rxPreviewHost").innerHTML = `<div style="font-size:12.5px;color:var(--slate-500)">Generating draft…</div>`;

  try {
    const context = await dzGatherConsultationContext(dzSelected.patients, { id: dzSelected.visit_id, chief_complaint: dzSelected.visits?.chief_complaint }, dzSelected);
    context.reportSummaries = dzReportSummaries;
    const r = await dzGeneratePrescriptionFromConsultation(transcript, context);
    if (!r.ok) {
      analyzeStatus.innerHTML = `<span style="color:var(--signal-critical)">${r.error}</span>`;
      document.getElementById("rxPreviewHost").innerHTML = dzEmptyState("⚠","Could not generate draft", r.error);
      return;
    }
    dzLastDraft = r.data;
    dzLastContext = context;

    document.getElementById("pComplaints").value = r.data.chief_complaint || "";
    document.getElementById("pExam").value = [r.data.history, r.data.examination].filter(Boolean).join("\n");
    document.getElementById("pDiag").value = r.data.provisional_diagnosis || "";
    document.getElementById("pDDx").value = (r.data.differential_diagnosis||[]).join(", ");
    document.getElementById("pInvest").value = (r.data.investigations||[]).join(", ");
    document.getElementById("pAdvice").value = [r.data.advice_english, r.data.advice_urdu].filter(Boolean).join("\n\n");
    document.getElementById("pReferral").value = (r.data.referral && r.data.referral !== "Not clearly mentioned") ? r.data.referral : "";
    dzMeds = (r.data.medicines||[]).map(m => ({ name: [m.name,m.strength].filter(Boolean).join(" "), dosage: m.dose||"", frequency: m.frequency||"", duration: m.duration||"" }));
    if (!dzMeds.length) dzMeds = [{name:"",dosage:"",frequency:"",duration:""}];
    dzRenderMeds();

    const warnings = dzRunSafetyChecks(r.data, context);
    document.getElementById("rxWarnings").innerHTML = warnings.map(w => `<div class="warnBar ${w.level}">${dzEsc(w.text)}</div>`).join("");

    document.getElementById("rxPreviewHost").innerHTML = dzRenderPrescriptionPreview(r.data, dzSelected.patients, { id: dzSelected.visit_id });
    document.getElementById("rxPreviewActions").style.display = "block";

    analyzeStatus.innerHTML = `<span style="color:var(--signal-success);font-weight:700">✓ Draft generated — review the form on the left, edit anything, then Approve &amp; Save.</span>`;
  } catch (e) {
    analyzeStatus.innerHTML = `<span style="color:var(--signal-critical)">Analysis failed: ${e.message}</span>`;
  }
}

async function dzAiAction(kind) {
  const out = document.getElementById("aiOut");
  const ctx = `Patient: ${dzSelected.patients?.full_name}, ${dzSelected.patients?.age}y ${dzSelected.patients?.gender}. Complaint: ${document.getElementById('pComplaints').value}. Exam/History: ${document.getElementById('pExam').value}. Diagnosis so far: ${document.getElementById('pDiag').value}.`;
  const prompts = {
    soap: `Write a concise SOAP note (Subjective, Objective, Assessment, Plan) for a Pakistani GP clinic based on: ${ctx}`,
    diagnosis: `Suggest 2-3 likely diagnoses (most likely first) based on: ${ctx}. Return as a short list, no explanation beyond one line each.`,
    prescription: `As a clinical scribe, draft medicines (name, dose, frequency, duration) appropriate for: ${ctx}. Return as a short plain list, doctor will review before saving.`,
    redflags: `List any red-flag / urgent-referral symptoms implied by: ${ctx}. If none, say "No red flags identified from the given information."`,
    urdu: `Write 2-3 sentences of patient advice in Roman Urdu for: ${ctx}. Simple, reassuring, practical home-care and when to return.`,
    followup: `Suggest an appropriate follow-up plan (days, and what to check) for: ${ctx}. One or two sentences.`,
  };
  out.textContent = "Thinking…";
  const r = await AI.ask(prompts[kind]);
  out.textContent = r.ok ? r.text : `AI unavailable right now (${r.error}). This is a live status, not a script.`;
}

async function dzApprovePrescription() {
  const status = document.getElementById("rxStatus");
  const diag = document.getElementById("pDiag").value.trim();
  if (!diag) { status.innerHTML = `<span style="color:var(--signal-critical)">Diagnosis is required before approving.</span>`; return; }
  status.textContent = "Saving…";
  try {
    const followDays = parseInt(document.getElementById("pFollowup").value, 10);
    const { data: rx, error: rErr } = await window.dzSupabase.from("prescriptions").insert({
      organization_id: dzOrgId, visit_id: dzSelected.visit_id, patient_id: dzSelected.patient_id, doctor_id: dzDoctorId,
      complaints: document.getElementById("pComplaints").value || null,
      examination: document.getElementById("pExam").value || null,
      diagnosis: diag,
      differential_diagnosis: document.getElementById("pDDx").value || null,
      investigations: document.getElementById("pInvest").value || null,
      advice: document.getElementById("pAdvice").value || null,
      referral: document.getElementById("pReferral").value || null,
      follow_up_date: followDays ? new Date(Date.now()+followDays*86400000).toISOString().slice(0,10) : null,
      approved: true, approved_at: new Date().toISOString(),
    }).select("id").single();
    if (rErr) throw rErr;

    dzMeds = dzReadMedsFromDom(); // re-sync from DOM before saving - fixes medicines not saving if typed without clicking away
    const meds = dzMeds.filter(m => m.name.trim());
    if (meds.length) {
      const { error: iErr } = await window.dzSupabase.from("prescription_items").insert(
        meds.map(m => ({ prescription_id: rx.id, medicine_name: m.name, dosage: m.dosage, frequency: m.frequency, duration: m.duration }))
      );
      if (iErr) throw iErr;
      for (const m of meds) {
        await window.dzSupabase.from("pharmacy_queue").insert({
          organization_id: dzOrgId, prescription_id: rx.id, visit_id: dzSelected.visit_id, patient_id: dzSelected.patient_id,
          medicine_name: m.name, dosage: m.dosage, frequency: m.frequency, duration: m.duration, status: "pending",
        });
      }
    }
    if (followDays) {
      await window.dzSupabase.from("followups").insert({
        organization_id: dzOrgId, patient_id: dzSelected.patient_id, visit_id: dzSelected.visit_id,
        due_date: new Date(Date.now()+followDays*86400000).toISOString().slice(0,10),
        reason: diag, status: "scheduled",
      });
    }
    await window.dzSupabase.from("tokens").update({ status: "doctor_done" }).eq("id", dzSelected.id);
    status.innerHTML = `<span style="color:var(--signal-success);font-weight:700">✓ Prescription approved and routed to pharmacy.</span>`;
    dzSelected = null;
    document.getElementById("dMain").innerHTML = dzEmptyState("✚","Saved","Select the next patient from the queue.");
    await dzLoadQueue();
  } catch (e) {
    status.innerHTML = `<span style="color:var(--signal-critical)">Save failed: ${e.message}</span>`;
  }
}
