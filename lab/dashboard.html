<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab — Dr. Zaid Healthcare OS</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
<div id="dz-shell-root"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/shell.js"></script>
<script>
(async () => {
  const session = await dzRequireSession(["org_owner","branch_admin","super_admin","lab_technician"]);
  if (!session) return;
  dzRenderShell({ activeKey: "lab", title: "Lab", profile: session.profile });

  const content = document.getElementById("dz-content");
  content.innerHTML = `<div class="dz-grid" id="metrics">
      ${dzCard("Pending Tests","…")}
      ${dzCard("Completed Today","…")}
    </div>
    <div class="dz-panel">
      <h2>Lab Queue &amp; Report Intelligence <span class="dz-badge soon">Milestone 2/3</span></h2>
      <div class="sub">Pending orders, result entry and AI-assisted report interpretation move into this shell next.</div>
      ${dzEmptyState("⚗","Awaiting live data","Your lab queue and report tools will appear here in a later milestone.")}
    </div>`;

  try {
    const orgId = session.profile.organization_id;
    const today = new Date(); today.setHours(0,0,0,0);
    const [{count:pending}, {count:doneToday}] = await Promise.all([
      window.dzSupabase.from("lab_queue").select("id",{count:"exact",head:true}).eq("organization_id",orgId).in("status",["pending","collected"]),
      window.dzSupabase.from("lab_queue").select("id",{count:"exact",head:true}).eq("organization_id",orgId).eq("status","completed").gte("created_at",today.toISOString()),
    ]);
    document.getElementById("metrics").innerHTML =
      dzCard("Pending Tests", pending ?? 0, "Live") +
      dzCard("Completed Today", doneToday ?? 0, "Live");
  } catch (e) { console.warn("[Lab] metrics failed", e); }
})();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("../sw.js").catch(()=>{})})}</script>
</body>
</html>
