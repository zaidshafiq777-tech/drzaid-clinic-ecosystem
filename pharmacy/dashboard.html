<script src="../shared/command-bar.js"></script>

<script>
(async () => {
  const session = await dzRequireSession(["org_owner","branch_admin","super_admin","pharmacist"]);
  if (!session) return;
  dzRenderShell({ activeKey: "pharmacy", title: "Pharmacy", profile: session.profile });
  dzCommandBarInit(session.profile);
  dzCopilotInit(session.profile);

  const content = document.getElementById("dz-content");
  content.innerHTML = `<div class="dz-grid" id="metrics">
      ${dzCard("Today's Prescriptions","…")}
      ${dzCard("Waiting Dispense","…")}
      ${dzCard("Completed Today","…")}
      ${dzCard("Today's Revenue","…")}
      ${dzCard("Inventory Value","…")}
    </div>
    <div class="dz-panel">
      <h2>Prescription Queue <span class="dz-badge live">Live</span></h2>
      <div class="sub">Grouped by prescription. Run AI Pharmacy Agent before dispensing to check stock, interactions, allergies and expiry.</div>
      <div id="pharmQueue"></div>
    </div>
    <div class="dz-panel">
      <h2>Reports</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <button class="ai-btn" style="background:var(--slate-100)" onclick="dzLoadLowStock()">Low Stock</button>
        <button class="ai-btn" style="background:var(--slate-100)" onclick="dzLoadExpiring()">Near Expiry (60d)</button>
        <button class="ai-btn" style="background:var(--slate-100)" onclick="dzLoadExpired()">Expired</button>
        <button class="ai-btn" style="background:var(--slate-100)" onclick="dzLoadDeadStock()">Dead Stock (60d no movement)</button>
        <button class="ai-btn" style="background:var(--slate-100)" onclick="dzLoadTopSelling()">Top Selling (30d)</button>
      </div>
      <div id="reportsHost"></div>
    </div>
    <div class="dz-panel">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 style="margin:0">Medicine Inventory</h2>
        <button class="ai-btn" style="background:var(--clinical-700);color:#fff" onclick="dzToggleAddMedicine()">+ Add New Medicine</button>
      </div>
      <div id="addMedicineForm" style="display:none;background:var(--slate-50);border-radius:8px;padding:12px;margin-top:10px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px">
          <input id="mName" placeholder="Medicine name *">
          <input id="mGeneric" placeholder="Generic name">
          <input id="mBrand" placeholder="Brand name">
          <input id="mCategory" placeholder="Category">
          <select id="mForm"><option value="">Form</option><option>Tab</option><option>Cap</option><option>Syp</option><option>Inj</option><option>Cream</option><option>Drops</option><option>Inhaler</option></select>
          <input id="mStrength" placeholder="Strength e.g. 500mg">
          <input id="mUnit" placeholder="Unit e.g. tablet" value="tablet">
          <input id="mBatch" placeholder="Batch number">
          <input id="mExpiry" type="date" placeholder="Expiry date">
          <input id="mPurchase" type="number" placeholder="Purchase price">
          <input id="mSale" type="number" placeholder="Sale price">
          <input id="mQty" type="number" placeholder="Stock quantity">
          <input id="mReorder" type="number" placeholder="Min stock alert" value="10">
          <input id="mSupplier" placeholder="Supplier">
          <input id="mRack" placeholder="Rack/location">
        </div>
        <textarea id="mNotes" placeholder="Notes" rows="2" style="width:100%;margin-top:8px;padding:8px;border:1px solid var(--slate-200);border-radius:6px;box-sizing:border-box"></textarea>
        <button class="primary-btn" style="margin-top:8px" onclick="dzSaveNewMedicine()">Save Medicine</button>
        <div id="addMedicineStatus" style="font-size:12px;margin-top:6px"></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <input id="medSearchBox" placeholder="Search medicine name, generic, barcode, or SKU…" style="flex:1;padding:8px;border:1px solid var(--slate-200);border-radius:7px" oninput="dzSearchMedicines()">
      </div>
      <div id="medicineListHost" style="margin-top:10px"></div>
    </div>`;
  await dzLoadPharmMetrics();
  await dzLoadPharmQueue();
})();

function dzToggleAddMedicine() {
  const el = document.getElementById("addMedicineForm");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

async function dzSaveNewMedicine() {
  const status = document.getElementById("addMedicineStatus");
  const name = document.getElementById("mName").value.trim();
  if (!name) { status.innerHTML = `<span style="color:var(--signal-critical)">Medicine name is required.</span>`; return; }
  status.textContent = "Checking for duplicates…";
  try {
    const orgId = window.DZ_SESSION.profile.organization_id;
    // AI Pharmacy Agent: real duplicate check against existing real inventory.
    const { data: existing } = await window.dzSupabase.from("medicines").select("id, name").eq("organization_id", orgId).ilike("name", name);
    if (existing && existing.length) {
      if (!confirm(`A medicine named "${existing[0].name}" already exists. Add another batch for it instead of creating a duplicate entry?\\n\\nOK = use existing medicine (add batch)\\nCancel = create as a new separate entry anyway`)) {
        // proceed to create new anyway (fallthrough)
      } else {
        await dzAddBatchToMedicine(existing[0].id, status);
        return;
      }
    }
    status.textContent = "Saving…";
    const { data: med, error: mErr } = await window.dzSupabase.from("medicines").insert({
      organization_id: orgId, name,
      generic_name: document.getElementById("mGeneric").value || null,
      brand_name: document.getElementById("mBrand").value || null,
      category: document.getElementById("mCategory").value || null,
      form: document.getElementById("mForm").value || null,
      strength: document.getElementById("mStrength").value || null,
      unit: document.getElementById("mUnit").value || "tablet",
      supplier: document.getElementById("mSupplier").value || null,
      rack_location: document.getElementById("mRack").value || null,
      notes: document.getElementById("mNotes").value || null,
      reorder_level: document.getElementById("mReorder").value || 10,
    }).select("id").single();
    if (mErr) throw mErr;
    await dzAddBatchToMedicine(med.id, status);
  } catch (e) {
    status.innerHTML = `<span style="color:var(--signal-critical)">Save failed: ${e.message}</span>`;
  }
}

async function dzAddBatchToMedicine(medicineId, status) {
  const orgId = window.DZ_SESSION.profile.organization_id;
  const qty = parseInt(document.getElementById("mQty").value, 10) || 0;
  if (qty > 0) {
    const { data: batch, error: bErr } = await window.dzSupabase.from("medicine_batches").insert({
      organization_id: orgId, medicine_id: medicineId,
      batch_no: document.getElementById("mBatch").value || null,
      expiry_date: document.getElementById("mExpiry").value || null,
      qty, purchase_price: document.getElementById("mPurchase").value || 0,
      sale_price: document.getElementById("mSale").value || 0,
    }).select("id").single();
    if (bErr) throw bErr;
    await window.dzSupabase.from("stock_ledger").insert({
      organization_id: orgId, medicine_id: medicineId, batch_id: batch.id,
      change_qty: qty, reason: "initial_stock", created_by: window.DZ_SESSION.user.id,
    });
  }
  status.innerHTML = `<span style="color:var(--signal-success);font-weight:700">✓ Medicine saved.</span>`;
  document.getElementById("addMedicineForm").style.display = "none";
  ["mName","mGeneric","mBrand","mCategory","mStrength","mBatch","mExpiry","mPurchase","mSale","mQty","mSupplier","mRack","mNotes"].forEach(id => document.getElementById(id).value = "");
  await dzLoadPharmMetrics();
  await dzSearchMedicines();
}

let dzMedSearchTimer = null;
function dzSearchMedicines() {
  clearTimeout(dzMedSearchTimer);
  dzMedSearchTimer = setTimeout(async () => {
    const q = document.getElementById("medSearchBox").value.trim();
    const host = document.getElementById("medicineListHost");
    const orgId = window.DZ_SESSION.profile.organization_id;
    let query = window.dzSupabase.from("medicines").select("id, name, generic_name, brand_name, barcode, sku, form, strength, reorder_level, medicine_batches(qty, expiry_date)").eq("organization_id", orgId);
    if (q) query = query.or(`name.ilike.%${q}%,generic_name.ilike.%${q}%,barcode.ilike.%${q}%,sku.ilike.%${q}%`);
    const { data, error } = await query.limit(30);
    if (error) { host.innerHTML = `<div style="color:var(--signal-critical);font-size:12px">${error.message}</div>`; return; }
    if (!data || !data.length) { host.innerHTML = dzEmptyState("💊","No medicines found","Add your first medicine above."); return; }
    host.innerHTML = data.map(m => {
      const totalQty = (m.medicine_batches||[]).reduce((s,b)=>s+(b.qty||0),0);
      const low = totalQty <= (m.reorder_level||10);
      return `<div style="border:1px solid var(--slate-200);border-radius:7px;padding:8px 12px;margin-bottom:5px;display:flex;justify-content:space-between;font-size:12.5px">
        <span><b>${m.name}</b> ${m.form||''} ${m.strength||''} ${m.brand_name?'('+m.brand_name+')':''} ${m.generic_name?'<span style="color:var(--slate-500)">— '+m.generic_name+'</span>':''}</span>
        <span style="${low?'color:var(--signal-critical);font-weight:700':''}">Stock: ${totalQty}</span>
      </div>`;
    }).join("");
  }, 250);
}

async function dzLoadLowStock() {
  const host = document.getElementById("reportsHost");
  host.innerHTML = `<div style="font-size:12px;color:var(--slate-500)">Loading…</div>`;
  const orgId = window.DZ_SESSION.profile.organization_id;
  const { data } = await window.dzSupabase.from("medicines").select("id, name, reorder_level, medicine_batches(qty)").eq("organization_id", orgId).eq("is_active", true);
  const low = (data||[]).map(m => ({...m, total: (m.medicine_batches||[]).reduce((s,b)=>s+(b.qty||0),0)})).filter(m => m.total <= (m.reorder_level||10));
  host.innerHTML = low.length ? low.map(m => `<div style="border-left:3px solid var(--signal-critical);padding:6px 10px;margin-bottom:4px;font-size:12.5px">${m.name} — ${m.total} left (min ${m.reorder_level||10})</div>`).join("") : dzEmptyState("✓","No low-stock items","All medicines are above their minimum stock level.");
}

async function dzLoadExpiring() {
  const host = document.getElementById("reportsHost");
  host.innerHTML = `<div style="font-size:12px;color:var(--slate-500)">Loading…</div>`;
  const orgId = window.DZ_SESSION.profile.organization_id;
  const today = new Date().toISOString().slice(0,10);
  const soon = new Date(); soon.setDate(soon.getDate()+60);
  const { data } = await window.dzSupabase.from("medicine_batches").select("batch_no, expiry_date, qty, medicines(name)").eq("organization_id", orgId).lte("expiry_date", soon.toISOString().slice(0,10)).gt("expiry_date", today).gt("qty", 0);
  host.innerHTML = (data&&data.length) ? data.map(b => `<div style="border-left:3px solid var(--signal-warning);padding:6px 10px;margin-bottom:4px;font-size:12.5px">${b.medicines?.name||'?'} — batch ${b.batch_no||'-'} — expires ${b.expiry_date} — qty ${b.qty}</div>`).join("") : dzEmptyState("✓","Nothing expiring soon","No batches expiring within 60 days.");
}

async function dzLoadExpired() {
  const host = document.getElementById("reportsHost");
  host.innerHTML = `<div style="font-size:12px;color:var(--slate-500)">Loading…</div>`;
  const orgId = window.DZ_SESSION.profile.organization_id;
  const today = new Date().toISOString().slice(0,10);
  const { data } = await window.dzSupabase.from("medicine_batches").select("batch_no, expiry_date, qty, medicines(name)").eq("organization_id", orgId).lt("expiry_date", today).gt("qty", 0);
  host.innerHTML = (data&&data.length) ? data.map(b => `<div style="border-left:3px solid var(--signal-critical);padding:6px 10px;margin-bottom:4px;font-size:12.5px">${b.medicines?.name||'?'} — batch ${b.batch_no||'-'} — <b>expired ${b.expiry_date}</b> — qty ${b.qty} (remove from sale, do not dispense)</div>`).join("") : dzEmptyState("✓","No expired stock","Nothing has passed its expiry date.");
}

async function dzLoadDeadStock() {
  const host = document.getElementById("reportsHost");
  host.innerHTML = `<div style="font-size:12px;color:var(--slate-500)">Checking last 60 days of dispensing…</div>`;
  const orgId = window.DZ_SESSION.profile.organization_id;
  const since = new Date(); since.setDate(since.getDate()-60);
  const [{ data: allMeds }, { data: recentMoves }] = await Promise.all([
    window.dzSupabase.from("medicines").select("id, name, medicine_batches(qty)").eq("organization_id", orgId).eq("is_active", true),
    window.dzSupabase.from("stock_ledger").select("medicine_id").eq("organization_id", orgId).gte("created_at", since.toISOString()).eq("reason", "dispense"),
  ]);
  const movedIds = new Set((recentMoves||[]).map(r => r.medicine_id));
  const dead = (allMeds||[]).map(m => ({...m, total:(m.medicine_batches||[]).reduce((s,b)=>s+(b.qty||0),0)})).filter(m => !movedIds.has(m.id) && m.total > 0);
  host.innerHTML = dead.length ? dead.map(m => `<div style="border-left:3px solid var(--slate-500);padding:6px 10px;margin-bottom:4px;font-size:12.5px">${m.name} — ${m.total} in stock, no dispense recorded in 60 days</div>`).join("") : dzEmptyState("✓","No dead stock detected","Every in-stock medicine has moved in the last 60 days (or none have stock).");
}

async function dzLoadTopSelling() {
  const host = document.getElementById("reportsHost");
  host.innerHTML = `<div style="font-size:12px;color:var(--slate-500)">Loading…</div>`;
  const orgId = window.DZ_SESSION.profile.organization_id;
  const since = new Date(); since.setDate(since.getDate()-30);
  const { data } = await window.dzSupabase.from("stock_ledger").select("medicine_id, change_qty, medicines(name)").eq("organization_id", orgId).eq("reason", "dispense").gte("created_at", since.toISOString());
  if (!data || !data.length) { host.innerHTML = dzEmptyState("📊","No dispensing recorded yet","Top-selling data will appear once medicines are dispensed via the queue."); return; }
  const totals = {};
  data.forEach(r => { const name = r.medicines?.name || "Unknown"; totals[name] = (totals[name]||0) + Math.abs(r.change_qty||0); });
  const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]).slice(0,10);
  host.innerHTML = sorted.map(([name,qty],i) => `<div style="padding:6px 10px;border-bottom:1px solid var(--slate-100);font-size:12.5px">${i+1}. ${name} — ${qty} units (last 30 days)</div>`).join("");
}

async function dzLoadPharmMetrics() {
  try {
    const orgId = window.DZ_SESSION.profile.organization_id;
    const { startUtc, endUtc } = dzGetClinicDayRange("Asia/Karachi");
    const [{data:todayRows}, {count:pending}, {data:dispensedToday}, {data:allBatches}] = await Promise.all([
      window.dzSupabase.from("pharmacy_queue").select("prescription_id").eq("organization_id",orgId).gte("created_at",startUtc).lt("created_at",endUtc),
      window.dzSupabase.from("pharmacy_queue").select("id",{count:"exact",head:true}).eq("organization_id",orgId).in("status",["pending","partial"]),
      window.dzSupabase.from("stock_ledger").select("change_qty, medicine_batches(sale_price)").eq("organization_id",orgId).eq("reason","dispense").gte("created_at",startUtc).lt("created_at",endUtc),
      window.dzSupabase.from("medicine_batches").select("qty, purchase_price").eq("organization_id",orgId),
    ]);
    const prescriptionsToday = new Set((todayRows||[]).map(r=>r.prescription_id)).size;
    const completedToday = (todayRows||[]).length ? await window.dzSupabase.from("pharmacy_queue").select("id",{count:"exact",head:true}).eq("organization_id",orgId).eq("status","dispensed").gte("created_at",startUtc).lt("created_at",endUtc) : {count:0};
    const inventoryValue = (allBatches||[]).reduce((s,b)=>s+(b.qty||0)*(b.purchase_price||0),0);
    const todayRevenue = (dispensedToday||[]).reduce((s,r)=>s+Math.abs(r.change_qty||0)*(r.medicine_batches?.sale_price||0),0);
    document.getElementById("metrics").innerHTML =
      dzCard("Today's Prescriptions", prescriptionsToday, "Live") +
      dzCard("Waiting Dispense", pending ?? 0, "Live") +
      dzCard("Completed Today", completedToday.count ?? 0, "Live") +
      dzCard("Today's Revenue", "Rs " + Math.round(todayRevenue).toLocaleString(), "Live — from actual dispensed batches") +
      dzCard("Inventory Value", "Rs " + Math.round(inventoryValue).toLocaleString(), "Live — purchase price basis");
  } catch (e) { console.warn("[Pharmacy] metrics failed", e); }
}

async function dzLoadPharmQueue() {
  const host = document.getElementById("pharmQueue");
  host.innerHTML = `<div style="font-size:12.5px;color:var(--slate-500)">Loading…</div>`;
  try {
    const orgId = window.DZ_SESSION.profile.organization_id;
    const { data, error } = await window.dzSupabase.from("pharmacy_queue")
      .select("id, prescription_id, patient_id, medicine_name, dosage, frequency, duration, status, priority, created_at, patients(full_name)")
      .eq("organization_id", orgId).in("status", ["pending","partial"])
      .order("created_at", { ascending: true });
    if (error) throw error;
    if (!data || !data.length) { host.innerHTML = dzEmptyState("℞","Queue is empty","Dispensed items appear here once a doctor approves a prescription."); return; }

    // Group by prescription for a cleaner "one card per prescription" view.
    const byRx = new Map();
    data.forEach(r => { if (!byRx.has(r.prescription_id)) byRx.set(r.prescription_id, []); byRx.get(r.prescription_id).push(r); });

    host.innerHTML = [...byRx.entries()].map(([rxId, items]) => `
      <div style="border:1px solid var(--slate-200);border-radius:8px;padding:12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div><b>${items[0].patients?.full_name||'Unknown patient'}</b> <span style="font-size:11px;color:var(--slate-500)">· ${new Date(items[0].created_at).toLocaleTimeString()} · ${items.length} medicine(s)</span></div>
          <button class="ai-btn" style="background:var(--clinical-100);color:var(--clinical-700)" onclick="dzRunAgentForRx('${rxId}','${items[0].patient_id}')">🤖 AI Pharmacy Agent</button>
        </div>
        <div id="agentWarnings-${rxId}"></div>
        ${items.map(r => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--slate-100);flex-wrap:wrap;gap:6px">
            <div style="font-size:12.5px"><b>${r.medicine_name}</b> ${r.dosage||''} ${r.frequency||''} ${r.duration||''}</div>
            <div>
              <button class="ai-btn" style="background:#E6F6EE;color:var(--signal-success)" onclick="dzDispenseMedicine('${r.id}','dispensed')">Dispense</button>
              <button class="ai-btn" style="background:#FFF7E6;color:var(--signal-warning)" onclick="dzDispenseMedicine('${r.id}','partial')">Partial</button>
              <button class="ai-btn" style="background:var(--slate-100)" onclick="dzDispensePrompt('${r.id}','substitute')">Substitute</button>
              <button class="ai-btn" style="background:var(--slate-100)" onclick="dzDispenseMedicine('${r.id}','hold')">Hold</button>
              <button class="ai-btn" style="background:#FDECEC;color:var(--signal-critical)" onclick="dzDispenseMedicine('${r.id}','unavailable')">Unavailable</button>
            </div>
          </div>`).join("")}
      </div>`).join("");
  } catch (e) { host.innerHTML = `<div style="color:var(--signal-critical);font-size:12.5px">${e.message}</div>`; }
}

/** Real AI Pharmacy Agent run - Observe/Think/Recommend against real data. Suggests only, never auto-changes anything. */
async function dzRunAgentForRx(prescriptionId, patientId) {
  const host = document.getElementById(`agentWarnings-${prescriptionId}`);
  host.innerHTML = `<div style="font-size:11.5px;color:var(--slate-500);margin:6px 0">Analyzing…</div>`;
  const orgId = window.DZ_SESSION.profile.organization_id;
  const context = await dzPharmacyObserve(prescriptionId, patientId, orgId);
  const { warnings } = await dzRunPharmacyAgent(context, orgId);
  if (!warnings.length) { host.innerHTML = `<div class="warnBar" style="background:#E6F6EE;color:var(--signal-success);padding:6px 10px;border-radius:6px;font-size:11.5px;margin:6px 0">✓ No concerns found.</div>`; return; }
  host.innerHTML = warnings.map(w => `<div class="warnBar" style="background:${w.level==='critical'?'#FDECEC':w.level==='warning'?'#FFF7E6':'#E8F1FB'};color:${w.level==='critical'?'var(--signal-critical)':w.level==='warning'?'var(--signal-warning)':'var(--signal-info)'};padding:6px 10px;border-radius:6px;font-size:11.5px;margin:4px 0"><b>${w.medicine!=='-'?w.medicine+': ':''}</b>${dzEsc(w.text)}</div>`).join("");
}

/** Real dispense - deducts actual stock (FEFO: earliest-expiring batch first) and logs to stock_ledger. */
async function dzDispenseMedicine(queueId, action, qtyOverride) {
  try {
    const orgId = window.DZ_SESSION.profile.organization_id;
    const { data: qRow } = await window.dzSupabase.from("pharmacy_queue").select("medicine_name").eq("id", queueId).single();
    if ((action === "dispensed" || action === "partial") && qRow) {
      const { data: med } = await window.dzSupabase.from("medicines").select("id, medicine_batches(id, qty, expiry_date)").eq("organization_id", orgId).ilike("name", qRow.medicine_name).limit(1).maybeSingle();
      if (med) {
        const batches = (med.medicine_batches||[]).filter(b => b.qty > 0).sort((a,b) => new Date(a.expiry_date||'9999-12-31') - new Date(b.expiry_date||'9999-12-31'));
        const dispenseQty = qtyOverride || 1;
        let remaining = dispenseQty;
        for (const b of batches) {
          if (remaining <= 0) break;
          const take = Math.min(b.qty, remaining);
          await window.dzSupabase.from("medicine_batches").update({ qty: b.qty - take }).eq("id", b.id);
          await window.dzSupabase.from("stock_ledger").insert({ organization_id: orgId, medicine_id: med.id, batch_id: b.id, change_qty: -take, reason: "dispense", ref_id: queueId, created_by: window.DZ_SESSION.user.id });
          remaining -= take;
        }
      }
    }
    await window.dzSupabase.from("pharmacy_queue").update({ status: action }).eq("id", queueId);
    await dzLoadPharmQueue();
    await dzLoadPharmMetrics();
  } catch (e) { alert("Update failed: " + e.message); }
}

function dzDispensePrompt(queueId, action) {
  const sub = prompt("Substitute with (medicine name):");
  if (!sub) return;
  window.dzSupabase.from("pharmacy_queue").update({ status: "dispensed", substituted_with: sub }).eq("id", queueId)
    .then(() => { dzLoadPharmQueue(); dzLoadPharmMetrics(); });
}
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("../sw.js").catch(()=>{})})}</script>
