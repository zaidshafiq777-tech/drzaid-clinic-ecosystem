<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distribution — Dr. Zaid Healthcare OS</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="../shared/theme.css">
<style>
  /* Distribution mounts INSIDE the existing dz-content area - no separate
     full-page chrome, no min-h-screen conflicts, no duplicate scrollbars. */
  #distribution-root { min-height: 60vh; }
  #distribution-root .min-h-screen { min-height: unset !important; }
</style>
</head>
<body>
<div id="dz-shell-root"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/auth-role-service.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/command-bar.js"></script>
<script src="../shared/ai-copilot.js"></script>
<script>
(async () => {
  // Distribution is authorized for owner-tier + explicit distro_role assignment
  // only - Reception/Doctor/Lab/Pharmacy staff never see this, per role rules.
  const session = await requireRole(null); // auth/profile gate only, role checked below
  if (!session) return;
  const isOwnerTier = ["org_owner","branch_admin","super_admin"].includes(session.profile.role);
  const hasDistroAccess = isOwnerTier || !!session.profile.distro_role;
  if (!hasDistroAccess) {
    document.getElementById("dz-shell-root").innerHTML = "";
    alert("You do not have access to Distribution.");
    window.location.href = getDefaultPortal(session.profile.role);
    return;
  }

  dzRenderShell({ activeKey: "distribution", title: "Distribution", profile: session.profile });
  dzCommandBarInit(session.profile);
  dzCopilotInit(session.profile);

  document.getElementById("dz-content").innerHTML = `
    <div class="dz-panel" style="padding:10px 14px;margin-bottom:14px">
      <div id="distroSubNav" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div id="distribution-root"></div>`;
  dzRenderDistroSubNav(new URLSearchParams(window.location.search).get("view") || "dashboard");

  // Load React 19 + the compiled Distribution bundle.
  window.__DZ_EMBEDDED__ = true;

  const cssLink = document.createElement("link");
  cssLink.rel = "stylesheet";
  cssLink.href = "dist/assets/index-BQaBUllC.css";
  document.head.appendChild(cssLink);

  // Give the bundle a #root element to mount into (it was built with its
  // own createRoot(document.getElementById('root')) bootstrap - simplest
  // safe integration without a deeper library-mode rebuild this round).
  // Note: the bundle already contains its own React 19 runtime (standard
  // Vite app-mode build bundles all dependencies) - no separate CDN load needed.
  const rootDiv = document.createElement("div");
  rootDiv.id = "root";
  document.getElementById("distribution-root").appendChild(rootDiv);

  const s3 = document.createElement("script");
  s3.type = "module";
  s3.src = "dist/assets/index-pArmJRWF.js";
  document.body.appendChild(s3);
})();

// PART 1 — real main-sidebar-driven navigation for Distribution sub-modules.
// These call the bridge function exposed by the React app (once mounted)
// instead of a full page reload, matching real internal view names.
const DZ_DISTRO_VIEWS = [
  { key: "dashboard", label: "Dashboard" },
  { key: "medicines", label: "Medicines / Suppliers / Retailers" },
  { key: "batches", label: "Stock / Batches" },
  { key: "ledger", label: "Stock Ledger" },
  { key: "parser", label: "AI Order Parser" },
  { key: "invoices", label: "Invoices" },
  { key: "dispatch", label: "Dispatch" },
  { key: "receivables", label: "Recovery" },
  { key: "approvals", label: "Approvals" },
  { key: "expiry", label: "Expiry Radar" },
  { key: "restock", label: "Smart Restock" },
  { key: "readiness", label: "Reports / Readiness" },
  { key: "settings", label: "Settings" },
];

function dzRenderDistroSubNav(activeView) {
  const host = document.getElementById("distroSubNav");
  if (!host) return;
  host.innerHTML = DZ_DISTRO_VIEWS.map(v => `
    <button onclick="dzGoDistroView('${v.key}')" style="padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;border:1px solid var(--slate-200);background:${v.key===activeView?'var(--clinical-700)':'#fff'};color:${v.key===activeView?'#fff':'var(--slate-700)'}">${v.label}</button>
  `).join("");
}

function dzGoDistroView(view) {
  if (typeof window.__DZ_DISTRIBUTION_SET_VIEW__ === "function") {
    window.__DZ_DISTRIBUTION_SET_VIEW__(view);
    dzRenderDistroSubNav(view);
    history.replaceState({}, "", window.location.pathname + "?view=" + view);
  } else {
    // App not mounted yet (race condition safety) - reload with the view param.
    window.location.href = "dashboard.html?view=" + view;
  }
}
</script>
</body>
</html>
