<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Returns — Distribution</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0B5C46">
<link rel="stylesheet" href="../shared/theme.css">
<style>
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--slate-500);font-size:10.5px;text-transform:uppercase;padding:7px 6px;border-bottom:1px solid var(--slate-200)}
  td{padding:6px;border-bottom:1px solid var(--slate-100)}
  .fld{margin-bottom:10px}
  .fld label{font-size:11.5px;font-weight:600;display:block;margin-bottom:4px}
  .fld input,.fld select{width:100%;padding:8px;border:1px solid var(--slate-200);border-radius:6px;font-size:12.5px;box-sizing:border-box}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .tab{padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--slate-500);border-bottom:2px solid transparent;cursor:pointer}
  .tab.active{color:var(--clinical-700);border-color:var(--clinical-700)}
  .st{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
  .st.requested{background:#FFF7E6;color:var(--signal-warning)}
  .st.approved{background:#E8F1FB;color:var(--signal-info)}
  .st.received{background:var(--clinical-100);color:var(--clinical-700)}
  .st.credited{background:#E6F6EE;color:var(--signal-success)}
  .st.rejected{background:#FDECEC;color:var(--signal-critical)}
  .btn{padding:5px 10px;border:none;border-radius:6px;font-size:11px;font-weight:700}
</style>
</head>
<body>
<div id="dz-shell-root"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/auth-role-service.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/command-bar.js"></script>
<script src="../shared/ai-copilot.js"></script>
<script>function dzEsc(s){return String(s==null?"":s).replace(/</g,"&lt;");}</script>
<script>
let dzOrgId = null;
(async () => {
  const session = await requireRole(null);
  if (!session) return;
  dzOrgId = session.profile.organization_id;
  dzRenderShell({ activeKey: "distribution", title: "Returns", profile: session.profile });
  dzCommandBarInit(session.profile);
  dzCopilotInit(session.profile);

  document.getElementById("dz-content").innerHTML = `
    <div class="dz-panel">
      <div class="tabs" style="display:flex;gap:4px;border-bottom:1px solid var(--slate-200);margin-bottom:14px">
        <div class="tab active" onclick="dzSwitchTab(0)">Sales Return</div>
        <div class="tab" onclick="dzSwitchTab(1)">Purchase Return</div>
      </div>
      <div id="panel-0">
        <button class="primary-btn" onclick="dzToggleReturn('sales')">+ New Sales Return</button>
        <div id="salesReturnForm" style="display:none;background:var(--slate-50);border-radius:8px;padding:14px;margin:14px 0"></div>
        <div id="salesReturnList" style="margin-top:14px">Loading…</div>
      </div>
      <div id="panel-1" style="display:none">
        <button class="primary-btn" onclick="dzToggleReturn('purchase')">+ New Purchase Return</button>
        <div id="purchaseReturnForm" style="display:none;background:var(--slate-50);border-radius:8px;padding:14px;margin:14px 0"></div>
        <div id="purchaseReturnList" style="margin-top:14px">Loading…</div>
      </div>
    </div>`;
  await dzLoadReturns("sales");
})();

function dzSwitchTab(i) {
  document.querySelectorAll(".tab").forEach((t,idx)=>t.classList.toggle("active",idx===i));
  document.getElementById("panel-0").style.display = i===0?"block":"none";
  document.getElementById("panel-1").style.display = i===1?"block":"none";
  dzLoadReturns(i===0?"sales":"purchase");
}

async function dzToggleReturn(type) {
  const host = document.getElementById(type==='sales'?"salesReturnForm":"purchaseReturnForm");
  if (host.style.display === "block") { host.style.display = "none"; return; }
  host.style.display = "block";
  const [{data:meds},{data:parties},{data:batches}] = await Promise.all([
    window.dzSupabase.from("distro_medicines").select("id,product_name").eq("organization_id",dzOrgId).eq("status","active"),
    type==='sales' ? window.dzSupabase.from("distro_retailers").select("id,shop_name").eq("organization_id",dzOrgId) : window.dzSupabase.from("distro_suppliers").select("id,name").eq("organization_id",dzOrgId),
    window.dzSupabase.from("distro_batches").select("id,batch_number,medicine_id").eq("organization_id",dzOrgId),
  ]);
  window._dzReturnBatches = batches || [];
  host.innerHTML = `
    <div class="grid3">
      <div class="fld"><label>${type==='sales'?'Retailer':'Supplier'} *</label><select id="rt_party_${type}"><option value="">Select…</option>${(parties||[]).map(p=>`<option value="${p.id}">${dzEsc(p.shop_name||p.name)}</option>`).join("")}</select></div>
      <div class="fld"><label>Medicine *</label><select id="rt_medicine_${type}" onchange="dzFilterBatches('${type}')"><option value="">Select…</option>${(meds||[]).map(m=>`<option value="${m.id}">${dzEsc(m.product_name)}</option>`).join("")}</select></div>
      <div class="fld"><label>Batch</label><select id="rt_batch_${type}"><option value="">Select medicine first…</option></select></div>
      <div class="fld"><label>Quantity *</label><input id="rt_qty_${type}" type="number"></div>
      <div class="fld"><label>Reason</label><select id="rt_reason_${type}">
        <option>Damaged</option><option>Wrong Product</option><option>Short Supply</option>
        <option>Near Expiry</option><option>Expired</option><option>Recall</option><option>Other</option>
      </select></div>
      <div class="fld"><label>Amount (Rs)</label><input id="rt_amount_${type}" type="number"></div>
    </div>
    <button class="primary-btn" onclick="dzSaveReturn('${type}')">Submit Return</button>
    <span id="rtStatus_${type}" style="margin-left:8px;font-size:12px"></span>`;
}

function dzFilterBatches(type) {
  const medId = document.getElementById(`rt_medicine_${type}`).value;
  const sel = document.getElementById(`rt_batch_${type}`);
  const batches = (window._dzReturnBatches||[]).filter(b => b.medicine_id === medId);
  sel.innerHTML = `<option value="">No specific batch</option>` + batches.map(b=>`<option value="${b.id}">${dzEsc(b.batch_number)||b.id.slice(0,8)}</option>`).join("");
}

async function dzSaveReturn(type) {
  const status = document.getElementById(`rtStatus_${type}`);
  const partyId = document.getElementById(`rt_party_${type}`).value;
  const medId = document.getElementById(`rt_medicine_${type}`).value;
  const qty = parseInt(document.getElementById(`rt_qty_${type}`).value, 10);
  if (!partyId || !medId || !qty) { status.innerHTML = `<span style="color:var(--signal-critical)">Fill all required fields.</span>`; return; }
  const me = (await window.dzSupabase.auth.getUser()).data.user.id;
  const row = {
    organization_id: dzOrgId, return_type: type, medicine_id: medId,
    batch_id: document.getElementById(`rt_batch_${type}`).value || null,
    quantity: qty, reason: document.getElementById(`rt_reason_${type}`).value,
    amount: parseFloat(document.getElementById(`rt_amount_${type}`).value)||0,
    status: "requested", created_by: me,
  };
  if (type === "sales") row.retailer_id = partyId; else row.supplier_id = partyId;
  const { error } = await window.dzSupabase.from("distro_returns").insert(row);
  if (error) { status.innerHTML = `<span style="color:var(--signal-critical)">${error.message}</span>`; return; }
  status.innerHTML = `<span style="color:var(--signal-success);font-weight:700">✓ Submitted.</span>`;
  document.getElementById(type==='sales'?"salesReturnForm":"purchaseReturnForm").style.display = "none";
  await dzLoadReturns(type);
}

async function dzLoadReturns(type) {
  const host = document.getElementById(type==='sales'?"salesReturnList":"purchaseReturnList");
  const { data, error } = await window.dzSupabase.from("distro_returns")
    .select("*, distro_medicines(product_name), distro_retailers(shop_name), distro_suppliers(name)")
    .eq("organization_id",dzOrgId).eq("return_type",type).order("created_at",{ascending:false});
  if (error) { host.innerHTML = `<div style="color:var(--signal-critical);font-size:12px">${error.message}</div>`; return; }
  if (!data || !data.length) { host.innerHTML = dzEmptyState("↩","No returns yet",""); return; }
  host.innerHTML = `<table><thead><tr><th>${type==='sales'?'Retailer':'Supplier'}</th><th>Medicine</th><th>Qty</th><th>Reason</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${data.map(r => `<tr>
      <td>${dzEsc(r.distro_retailers?.shop_name || r.distro_suppliers?.name)}</td>
      <td>${dzEsc(r.distro_medicines?.product_name)}</td><td>${r.quantity}</td><td>${dzEsc(r.reason)}</td>
      <td><span class="st ${r.status}">${r.status}</span></td>
      <td>${dzReturnActions(r)}</td>
    </tr>`).join("")}</tbody></table>`;
}

function dzReturnActions(r) {
  if (r.status === "requested") return `<button class="btn" style="background:#E6F6EE;color:var(--signal-success)" onclick="dzApproveReturn('${r.id}')">Approve</button><button class="btn" style="background:#FDECEC;color:var(--signal-critical)" onclick="dzRejectReturn('${r.id}')">Reject</button>`;
  if (r.status === "approved") return `<button class="btn" style="background:var(--clinical-700);color:#fff" onclick="dzReceiveReturn('${r.id}')">Mark Received &amp; Inspect</button>`;
  return "";
}
async function dzApproveReturn(id) { await window.dzSupabase.from("distro_returns").update({status:"approved"}).eq("id",id); await dzLoadReturns(document.getElementById("salesReturnForm")?.style.display!==undefined?"sales":"purchase"); location.reload(); }
async function dzRejectReturn(id) { await window.dzSupabase.from("distro_returns").update({status:"rejected"}).eq("id",id); location.reload(); }

/** Real inspection: expired/damaged goods NEVER auto-return to saleable stock. */
async function dzReceiveReturn(id) {
  const disposition = prompt("Inspection result — type one of: restock / quarantine / damage");
  if (!disposition || !["restock","quarantine","damage"].includes(disposition.toLowerCase())) { alert("Enter exactly: restock, quarantine, or damage."); return; }
  const { data: r } = await window.dzSupabase.from("distro_returns").select("*").eq("id",id).single();
  if (!r) return;
  if (disposition.toLowerCase() === "restock" && r.batch_id) {
    const { data: b } = await window.dzSupabase.from("distro_batches").select("current_quantity").eq("id",r.batch_id).single();
    await window.dzSupabase.from("distro_batches").update({ current_quantity: (b?.current_quantity||0) + r.quantity, quantity_returned: r.quantity }).eq("id", r.batch_id);
    await window.dzSupabase.from("distro_stock_ledger").insert({
      organization_id: dzOrgId, transaction_type: r.return_type==='sales'?'Sales Return':'Purchase Return',
      product_id: r.medicine_id, batch_id: r.batch_id, quantity_in: r.quantity, quantity_out: 0,
      balance_after: (b?.current_quantity||0)+r.quantity, reference_type: "return", reference_id: r.id, approval_status: "Approved",
    });
  }
  const { count } = await window.dzSupabase.from("distro_returns").select("id",{count:"exact",head:true}).eq("organization_id",dzOrgId).eq("status","credited");
  await window.dzSupabase.from("distro_returns").update({
    status: "credited", disposition: disposition.toLowerCase(),
    credit_note_number: "CN-" + String((count||0)+1).padStart(5,"0"),
  }).eq("id", id);
  alert(`Return processed as: ${disposition}. ${disposition.toLowerCase()==='restock'?'Stock restored.':'Stock kept out of saleable inventory.'}`);
  location.reload();
}
</script>
</body>
</html>
